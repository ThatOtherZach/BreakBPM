kind = "web"
previewPath = "/"
title = "BreakBPM"
version = "1.0.0"
id = "artifacts/breakbpm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21323

[services.development]
run = "pnpm --filter @workspace/breakbpm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/breakbpm", "run", "build" ]
publicDir = "artifacts/breakbpm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21323"
BASE_PATH = "/"
