openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BreakBPM API — accounts, passes, and game persistence
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Identity, screen name
  - name: passes
    description: Pass purchases, discount codes, entitlements
  - name: games
    description: Game start gating and history
  - name: findPlayers
    description: Find Players meetup board
  - name: venues
    description: Verified pool-hall venues (map + admin)
  - name: ads
    description: HUD text ads (public rotation + admin management)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /config:
    get:
      operationId: getAppConfig
      tags: [health]
      summary: Public runtime app config (no auth)
      description: >
        Server-resolved, client-safe config read fresh from the environment on
        every request so values can be swapped without rebuilding the static
        frontend. Currently exposes the splash QR/promo URL.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppConfig" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current account state (or null if signed-out)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  /auth/screen-name:
    patch:
      operationId: updateScreenName
      tags: [auth]
      summary: Update the signed-in user's screen name
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScreenNameUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

  /auth/profile-theme:
    patch:
      operationId: updateProfileTheme
      tags: [auth]
      summary: Update the signed-in user's watch-profile background theme
      description: >
        Sets the player's watch-profile background artwork preference. A
        Lifetime-pass perk (admins are effective Lifetime holders). "auto"
        clears the override so the artwork derives from the pass's redeem card
        (plain when the pass carried no card).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileThemeUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

  /passes/redeem:
    post:
      operationId: redeemDiscountCode
      tags: [passes]
      summary: Redeem a discount code (issues a pass)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscountRedeemInput" }
      responses:
        "200":
          description: Redeemed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RedeemResult" }

  /passes/claim:
    post:
      operationId: claimFreePass
      tags: [passes]
      summary: Claim the one-per-account free pass (landing-page giveaway)
      description: >
        Mints a single-use giveaway code and redeems it in one atomic
        transaction, drawing either a Lucky Break roll or a Day pass from the
        current month's limited stock. Requires sign-in. Each account may claim
        at most once, ever. Returns success:false with a machine-readable
        reason when the caller already claimed, already holds a pass, or all of
        the period's stock is gone. Takes no request body — the reward is drawn
        server-side.
      responses:
        "200":
          description: Claim result (granted, or rejected with a reason)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreePassClaimResult" }

  /passes/claim/status:
    get:
      operationId: getFreePassClaimStatus
      tags: [passes]
      summary: Free-pass giveaway stock + the caller's eligibility
      description: >
        Public. Returns remaining stock for the current period's reward pools
        and whether the giveaway is open. For a signed-in caller, also reports
        whether they have already used their one lifetime claim and whether
        they are eligible to claim right now.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreePassClaimStatus" }

  /passes/discount-codes:
    get:
      operationId: listMyGiftCodes
      tags: [passes]
      summary: List the caller's recently-generated Day-Pass gift codes
      description: >
        Returns the signed-in user's most recent gift codes (newest first)
        plus their cooldown state. Used by the Account screen to render the
        "Gift a Day Pass" section.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyGiftCodesResult" }
    post:
      operationId: generateGiftCode
      tags: [passes]
      summary: Generate a single-use 24-hour Day-Pass gift code
      description: >
        Year and Lifetime pass holders may generate one Day-Pass gift code
        every 12 hours. The new code is single-use, expires 24 hours after
        generation, and supersedes any previous unused gift code from the
        same issuer.
      responses:
        "200":
          description: Generated (or rejected with reason)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GiftCodeIssueResult" }

  /passes/admin/codes:
    get:
      operationId: listAdminDiscountCodes
      tags: [passes]
      summary: List the calling admin's minted comp codes
      description: >
        Admin-only. Returns the most recent comp codes the calling admin has
        minted (newest first). 403s for non-admin accounts.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminCodeList" }
    post:
      operationId: createAdminDiscountCode
      tags: [passes]
      summary: Mint a pass-granting comp code (admin only)
      description: >
        Admin-only. Mints a discount code that grants the chosen pass tier on
        redemption, with an optional redemption cap (omit for unlimited). 403s
        for non-admin accounts.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminCodeInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminCodeResult" }

  /passes/checkout:
    post:
      operationId: createPassCheckout
      tags: [passes]
      summary: Begin a pass purchase — returns a checkout URL + opaque token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PassCheckoutInput" }
      responses:
        "200":
          description: Checkout created (or rejected if no provider)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutResult" }

  /passes/verify:
    post:
      operationId: verifyPassCheckout
      tags: [passes]
      summary: Verify a checkout token and grant the pass on success
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyCheckoutInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyResult" }

  /passes/plans:
    get:
      operationId: listPlans
      tags: [passes]
      summary: The user-facing plan catalog (prices + metadata)
      description: >
        Single source of truth for prices and plan metadata. The client reads
        this rather than hardcoding amounts. Includes one-time passes (Day,
        Lifetime) and recurring subscriptions (Monthly, Yearly).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanCatalog" }

  /subscriptions/checkout:
    post:
      operationId: createSubscriptionCheckout
      tags: [passes]
      summary: Begin a subscription purchase — returns a checkout URL + token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubscriptionCheckoutInput" }
      responses:
        "200":
          description: Checkout created (or rejected if no provider / Lifetime held)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutResult" }

  /subscriptions/verify:
    post:
      operationId: verifySubscriptionCheckout
      tags: [passes]
      summary: Verify a subscription checkout token and activate on success
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyCheckoutInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubscriptionVerifyResult" }

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [passes]
      summary: Cancel the caller's subscription (stops renewal at period end)
      responses:
        "200":
          description: Cancellation result (or rejected if no provider)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelSubscriptionResult" }

  /crypto/quote:
    post:
      operationId: createCryptoQuote
      tags: [passes]
      summary: Quote a one-time pass for on-chain payment (USDC or ETH on Base)
      description: >
        Creates a server-side order locking the exact on-chain amount to pay for
        the chosen one-time pass. For ETH the amount is locked against the
        current Chainlink ETH/USD price and expires; for USDC it is the fixed
        USD price. The caller pays the returned amount to the returned address
        from the connected wallet, then calls /crypto/verify with the tx hash.
        Rejected with success=false when crypto checkout is closed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CryptoQuoteInput" }
      responses:
        "200":
          description: Quote created (or rejected)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CryptoQuoteResult" }

  /crypto/verify:
    post:
      operationId: verifyCryptoPayment
      tags: [passes]
      summary: Verify an on-chain payment for a crypto order and grant the pass
      description: >
        Reads the submitted transaction on Base and, once it has enough
        confirmations and matches the order (recipient, payer, asset, amount),
        grants the pass idempotently (keyed on the tx hash). Doubles as a manual
        recovery path — a user who paid but lost the redirect can re-submit their
        tx hash. `status` discriminates granted / pending (keep polling) /
        not_found / mismatch / failed / expired.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CryptoVerifyInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CryptoVerifyResult" }

  /games/start:
    post:
      operationId: startGame
      tags: [games]
      summary: Check whether the caller may start a new game
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartGameInput" }
      responses:
        "200":
          description: Allowed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StartGameResult" }

  /games/activity:
    post:
      operationId: recordGameActivity
      tags: [games]
      summary: Record a logged in-game action (resets the inactivity clock)
      description: >
        Called by the client every time a player logs an action
        (sink/miss/foul/safety). NOT a periodic heartbeat — the inactivity
        forfeit deliberately tracks gameplay, not tab liveness.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameActivityInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameActivityResult" }

  /games/resume:
    get:
      operationId: getResumableGame
      tags: [games]
      summary: Return the caller's most recent in-progress game, if any
      description: >
        Used on first mount when localStorage is empty (e.g. different
        device, cleared browser) so signed-in users can pick the game
        they had open back up. Sweeps stale games first so a long-idle
        row is auto-forfeited rather than offered for resume.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResumableGameResponse" }

  /games/abandon:
    post:
      operationId: abandonGame
      tags: [games]
      summary: Mark an in-progress game as abandoned (forfeit)
      description: >
        Called when the user explicitly declines to resume an offered
        in-progress game, so the row doesn't linger waiting for the
        inactivity sweep.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AbandonGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AbandonGameResult" }

  /games/resolve:
    post:
      operationId: resolveShareCode
      tags: [games]
      summary: Look up a share code → game metadata for the join flow
      description: >
        Rate-limited (per-IP) lookup. Returns game state hints so the
        client can decide whether to assign the caller as a player or as
        a spectator. Never returns the full gameState — the caller must
        explicitly POST /games/join to participate.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveShareCodeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolveShareCodeResult" }
        "429":
          description: Too many requests

  /games/join:
    post:
      operationId: joinGame
      tags: [games]
      summary: Join an active game by share code
      description: >
        Atomically allocates the next open slot, or returns spectator
        status when slots are full / the mode is solo. Anonymous callers
        get a guest displayName; their participation is not history-eligible.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinGameResult" }

  /games/state:
    get:
      operationId: getGameStateByCode
      tags: [games]
      summary: Poll an active game's latest snapshot (for joiners/spectators)
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string, minLength: 5, maxLength: 5 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameStateSnapshot" }

  /games/watch-resolve:
    get:
      operationId: resolveWatchByName
      tags: [games]
      summary: Resolve a host's screen name → their current live game's share code
      description: >
        Rate-limited (per-IP) lookup powering the persistent /watch/{name}
        spectator link. Maps a host's screen name (case-insensitive) to the
        share code of their most recent in-progress game, sweeping stale
        games first. Returns a reason when the name is unknown or the host
        has no live game right now. Never returns the full gameState — the
        caller polls /games/state with the returned share code.
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 40 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolveWatchByNameResult" }
        "429":
          description: Too many requests

  /games/profile:
    get:
      operationId: getPublicProfile
      tags: [games]
      summary: Public profile (member-since + last 5 games) for a player by screen name
      description: >
        Rate-limited (per-IP) public profile shown on /watch/{name} when the
        player has no live game right now. Resolves a host's screen name
        (case-insensitive) to their member-since date and their five most
        recent completed games. No auth required and never exposes email or
        in-progress game state — purely the same read-only history cards the
        owner sees on their account page.
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 40 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfileResult" }
        "429":
          description: Too many requests

  /games/leave:
    post:
      operationId: leaveGame
      tags: [games]
      summary: Leave an in-progress game (forfeits on this participant's behalf)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeaveGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveGameResult" }

  /games/save:
    post:
      operationId: saveGame
      tags: [games]
      summary: Persist a completed game (signed-in users only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameSaveInput" }
      responses:
        "200":
          description: Saved (or skipped for anonymous users)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SaveGameResult" }

  /games/history:
    get:
      operationId: getGameHistory
      tags: [games]
      summary: List the caller's saved games (gated by tier)
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
          description: >
            Page number (1-indexed). Only respected for pass holders;
            free accounts always receive their fixed 3-game slice.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameHistoryResponse" }

  /games/export:
    get:
      operationId: exportMyGames
      tags: [games]
      summary: Export all of the caller's games and shot logs as CSV
      description: >
        Returns a CSV download with one row per logged shot, flattening every
        game the signed-in caller participated in (hosted or joined). Each row
        carries the game-level columns (id, type, date, outcome, BPM, etc.)
        alongside the per-shot fields so the single flat file is self-contained
        and openable directly in a spreadsheet app. Requires authentication.
      responses:
        "200":
          description: CSV file (one row per shot)
          content:
            text/csv:
              schema: { type: string }
        "401":
          description: Sign in required

  /games/data:
    delete:
      operationId: deleteMyGameData
      tags: [games]
      summary: Permanently delete all of the caller's shot and game data
      description: >
        Scrubs the signed-in caller from every game they took part in (as host
        or joiner). For each game, if no other real (signed-in) player remains,
        the whole game is deleted — its shot log lives in the game record, so it
        goes too. If other real players remain, only the caller is removed: their
        name is replaced with a placeholder ("Mr. X") throughout the stored game
        (player list, every shot-log entry, and the winner) and their
        participation link is severed, so the game stays intact and correct for
        the remaining players while disappearing from the caller's own history,
        stats, and export. The user's account record, screen name, passes, and
        subscriptions are left intact. Requires authentication.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteGameDataResult" }
        "401":
          description: Sign in required

  /mentions/resolve:
    get:
      operationId: resolveMention
      tags: [games]
      summary: Validate an @handle for the Setup-screen mention affordance
      description: >
        Resolves a typed @handle to a real user for the inline Setup-screen
        check. Requires a paid signed-in host; reports whether the handle maps
        to a real (non-self) user and whether that recipient is already at
        their pending-invite cap. Never exposes any private data.
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MentionResolveResult" }

  /mentions:
    get:
      operationId: listMyInvites
      tags: [games]
      summary: List the caller's game invites (pending + accepted)
      description: >
        Returns the caller's @mention invites for finished games. Pending
        invites render as opt-in cards (Accept / Delete); accepted ones let
        the account page surface a per-game remove-me action on the matching
        history card. Declined/removed invites are never returned.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameInviteList" }

  /mentions/{id}/accept:
    post:
      operationId: acceptInvite
      tags: [games]
      summary: Accept a pending game invite (creates the real participant slot)
      description: >
        Links the caller to the game by creating their participant slot
        (reusing the join flow's slot/displayName/stats-window conventions) so
        the game counts toward their history and stats. Idempotent for an
        already-accepted invite.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptInviteResult" }

  /mentions/{id}:
    delete:
      operationId: removeInvite
      tags: [games]
      summary: Delete / decline an invite (or remove an accepted mention game)
      description: >
        Deleting a PENDING invite removes the invite row (it never counted).
        Deleting an ACCEPTED invite anonymizes the caller's slot in that game
        (reusing the per-game remove-me logic) so the game leaves their
        history/stats while the host's copy stays intact, then removes the
        invite. Busts the caller's stats cache.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoveInviteResult" }

  /stats:
    get:
      operationId: getStats
      tags: [games]
      summary: Aggregate shooting statistics, gated by tier
      description: >
        Returns derived statistics over completed games. Access scales with
        the caller's tier: anonymous → global scope, 24h window only;
        signed-in without a pass → personal scope, 24h window only; pass
        holders → personal stats with a selectable window (24h / 30d / 365d /
        all) plus an optional global overlay. Personal stats are attributed
        through game_participants (so joined games count, not just hosted
        ones) and recomputed per game from the shot log. The server clamps
        window/scope to what the caller's tier allows. Results are cached
        server-side with a 1-hour TTL; pass holders may pass refresh=true to
        force a fresh recompute of the requested key.
      parameters:
        - name: window
          in: query
          required: false
          schema: { type: string, enum: [24h, 30d, 365d, all], default: 24h }
          description: >
            Time window anchored on each game's endedAt. Clamped to 24h for
            callers without a pass.
        - name: scope
          in: query
          required: false
          schema: { type: string, enum: [personal, global], default: personal }
          description: >
            personal = games the caller participated in; global = aggregate
            across all users. Anonymous callers are forced to global;
            no-pass callers are forced to personal.
        - name: refresh
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: >
            Bypass and repopulate the cache for the requested key. Honored
            only for pass holders; ignored otherwise.
        - name: gameMode
          in: query
          required: false
          schema:
            type: string
            enum: [all, 8ball, 9ball, practice, shark]
            default: all
          description: >
            Filter stats to a single game mode. Pass holders only — callers
            without a pass are forced to "all". "shark" covers solo 8-ball-vs-AI
            games; "8ball" covers standard 8-ball games excluding shark.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsResult" }
        "429":
          description: Too many requests

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [games]
      summary: Balls-Per-Minute leaderboard
      description: >
        Ranking of registered players by a composite skill measure (recent pace
        scaled by accuracy, with games against registered opponents weighted
        above games against anonymous guests). 8-ball and 9-ball are ranked as
        separate boards selected by `mode` — they are never merged. The 30-day
        window is public (so the signed-out home-page widget works); the 90-day
        and all-time windows require a pass and are enforced server-side. Each
        (mode, window) ranking is computed once and cached for one hour, then
        paginated from the cache. BPM and accuracy are reported per row for
        display; the composite score itself is intentionally not exposed.
      parameters:
        - name: mode
          in: query
          required: false
          schema: { type: string, enum: [8ball, 9ball], default: 8ball }
          description: >
            Which board to rank: standard 1-on-1 8-ball or 9-ball. Defaults to
            8ball.
        - name: window
          in: query
          required: false
          schema: { type: string, enum: [30d, 90d, all], default: 30d }
          description: >
            Ranking window. 30d is public; 90d and all require a pass.
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaderboardResult" }
        "403":
          description: A pass is required for the requested window.
        "429":
          description: Too many requests

  /find-players/posts:
    get:
      operationId: listFindPlayerPosts
      tags: [findPlayers]
      summary: List active meetup posts (signed-in callers only)
      description: >
        Returns active (today-or-later, non-expired) posts soonest-first, 10 per page.
        Signed-out callers receive `signedIn: false` and an empty list — they
        see the page shell but no posts. Includes capability flags
        (`canCreate`) and the caller's current active-post count so the UI can
        react without hardcoding tier logic.
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: all
          in: query
          required: false
          description: >
            When true, returns ALL active posts in one page (unpaginated),
            soonest-first. Used by the map view, which must plot every active
            post globally rather than just the current list page.
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FindPlayerPostsResult" }
    post:
      operationId: createFindPlayerPost
      tags: [findPlayers]
      summary: Create a meetup post (paid tier only)
      description: >
        Only callers with `tier === 'pass'` may create posts. Enforces one
        active post per UTC calendar date, a maximum of 5 active posts, a
        numeric table number, and a scheduled time that is the poster's local
        today or later (any time of day) and at most one year out.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FindPlayerPostInput" }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateFindPlayerPostResult" }

  /find-players/posts/cancel:
    post:
      operationId: cancelFindPlayerPost
      tags: [findPlayers]
      summary: Cancel one of the caller's own posts
      description: >
        Sets the cancelled marker on the caller's own post. The place and time
        are no longer exposed; the card shows a "Cancelled" badge until the
        original scheduled time passes.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CancelFindPlayerPostInput" }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelFindPlayerPostResult" }

  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List active verified venues (signed-in callers, paginated)
      description: >
        Returns a page of the admin-curated set of ACTIVE verified pool-hall
        venues for the nearest-hall compass list, newest-first, with the total
        count and total page count so the client can paginate server-side as the
        directory grows. Venue coordinates are public business locations, so
        every signed-in caller sees them in full. Signed-out callers receive an
        empty page (venue features are gated to signed-in users in the UI).
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          description: Page size (verified halls per page).
          schema: { type: integer, minimum: 1, maximum: 50, default: 5 }
        - name: all
          in: query
          required: false
          description: >
            When true, returns ALL active venues in one page (newest-first),
            ignoring page/limit. Used by the nearest-hall compass, which must
            consider every verified hall to point at the globally closest one.
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenuePage" }

  /venues/osm:
    get:
      operationId: listOsmVenues
      tags: [venues]
      summary: Live OpenStreetMap billiards venues for a viewport (signed-in)
      description: >
        Server-side proxy + cache for OpenStreetMap (Overpass) billiards venues
        inside a bounding box, used by the map's OSM layer and the nearest-hall
        compass. The browser cannot query Overpass politely or reliably itself
        (it can't set a contact User-Agent, has no shared cache, and Overpass's
        WAF rejects the multi-clause union query from residential IPs), so the
        API does it instead: it runs single-clause queries across mirrors,
        caches results for ~24h keyed by a snapped bbox, and degrades
        gracefully. Signed-in only (not an open Overpass relay). An over-broad
        bbox returns status `too_broad`. On total upstream failure it returns a
        recent cached result flagged `stale` when one exists, otherwise status
        `error`.
      parameters:
        - name: south
          in: query
          required: true
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: west
          in: query
          required: true
          schema: { type: number, minimum: -180, maximum: 180 }
        - name: north
          in: query
          required: true
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: east
          in: query
          required: true
          schema: { type: number, minimum: -180, maximum: 180 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OsmVenueList" }

  /ads:
    get:
      operationId: listAds
      tags: [ads]
      summary: Ordered list of HUD text ads (public)
      description: >
        Public. Returns every saved text ad (id, headline, tagline) ordered by
        creation time (oldest first), for the in-game HUD rotation. The client
        shows them only to non-paying users and rotates through them in order.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdList" }

  /ads/pricing:
    get:
      operationId: getAdPricing
      tags: [ads]
      summary: Current dynamic ad pricing (signed-in)
      description: >
        Signed-in. Returns the live per-day ad rate (base × demand multiplier,
        floored), the max purchasable run length, and the active-ad count that
        drives the multiplier. The buyer UI multiplies effectiveDailyCents by
        the chosen days; /ads/quote re-freezes the same number at purchase time.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdPricing" }

  /ads/quote:
    post:
      operationId: createAdQuote
      tags: [ads]
      summary: Quote a user-bought HUD ad for on-chain payment (signed-in)
      description: >
        Signed-in. Validates + sanitizes the headline/tagline, freezes the
        current per-day rate × days into a total, and creates a manual crypto
        order (pay the unique exact amount to the receiving address from any
        wallet). The ad copy + run length are stashed on the order; the ad row
        itself is created (status pending_review) only once /crypto/verify
        confirms payment. Rejected with success=false when crypto is closed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdQuoteInput" }
      responses:
        "200":
          description: Quote created (or rejected)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdQuoteResult" }

  /ads/mine:
    get:
      operationId: listMyAds
      tags: [ads]
      summary: The caller's own bought ads (signed-in)
      description: >
        Signed-in. Returns the caller's purchased ads newest-first with their
        moderation status and live window, for the buyer's "my ads" list.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyAdsList" }

  /admin/venues:
    get:
      operationId: listAdminVenues
      tags: [venues]
      summary: List ALL verified venues incl. inactive (admin only)
      description: >
        Admin-only. Returns every verified venue (active and inactive),
        newest-first, for the admin management panel. 403 for non-admins.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueList" }
    post:
      operationId: createVenue
      tags: [venues]
      summary: Create a verified venue (admin only)
      description: >
        Admin-only. Adds a verified venue. 403 for non-admins.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VenueInput" }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueMutationResult" }

  /admin/venues/repair-coordinates:
    post:
      operationId: repairVenueCoordinates
      tags: [venues]
      summary: Re-place every venue pin from its saved address (admin only)
      description: >
        Admin-only. For every verified venue with a saved address, re-derives the
        map coordinates from that address (the address is authoritative) and
        updates the pin when it has drifted. Venues with no address, or whose
        address can't be geocoded, keep their existing coordinates and are
        reported as `failed`. 403 for non-admins.
      responses:
        "200":
          description: Repair summary
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/RepairVenueCoordinatesResult" }

  /admin/venues/{id}:
    patch:
      operationId: updateVenue
      tags: [venues]
      summary: Update a verified venue (admin only)
      description: >
        Admin-only. Replaces a venue's editable fields. 403 for non-admins.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VenueInput" }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueMutationResult" }
    delete:
      operationId: deleteVenue
      tags: [venues]
      summary: Delete a verified venue (admin only)
      description: >
        Admin-only. Removes a venue permanently. 403 for non-admins.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueMutationResult" }

  /admin/backfill-game-summaries:
    post:
      operationId: backfillGameSummaries
      tags: [admin]
      summary: Distill every finalized game into its summary (admin only)
      description: >
        Admin-only. Recomputes and writes the authoritative distilled summary for
        every already-finalized game (game-level + each participant), so the bulk
        stats/leaderboard/history/profile read paths stop skipping summary-less
        rows. Idempotent — re-running overwrites the same values. Used as a
        one-shot after a deploy to repair games that predate the summary rollout
        (the per-user lazy self-heal otherwise fixes them only as each player
        opens their own stats). 403 for non-admins.
      responses:
        "200":
          description: Backfill summary
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/BackfillGameSummariesResult" }

  /admin/sales:
    get:
      operationId: listAdminSales
      tags: [admin]
      summary: Sales/revenue ledger for the accountant (admin only)
      description: >
        Admin-only. Returns valued, taxed sale rows newest-first over an
        optional [from, to) date range, with revenue totals. Tax is the figure
        frozen at sale time (BC Canada: GST 5% + PST 7%, tax-inclusive). Comps
        (admin/gift/seed code redemptions) appear at $0 with `isComp: true`.
        `format=csv` streams a CSV download instead of JSON. 403s for
        non-admins.
      parameters:
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Inclusive lower bound on occurredAt (ISO 8601).
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Exclusive upper bound on occurredAt (ISO 8601).
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [json, csv], default: json }
          description: json (default) returns AdminSalesResponse; csv streams a download.
      responses:
        "200":
          description: OK (JSON body, or a CSV download when format=csv)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminSalesResponse" }

  /admin/leaderboard:
    get:
      operationId: listAdminLeaderboard
      tags: [admin]
      summary: Leaderboard with hidden anti-cheat signals (admin only)
      description: >
        Admin-only. Returns the SAME ordered ranking the public /leaderboard
        shows for the given mode+window, but exposes the signals the public row
        intentionally strips: the composite `score` actually ranked on, how many
        of each player's qualifying games were between two registered players
        (`trustedGames`), and a `provisional` thin-sample flag. Lets an admin
        eyeball suspicious early ranks (e.g. a top spot built entirely on guest
        games). 403s for non-admins.
      parameters:
        - name: mode
          in: query
          required: false
          schema: { type: string, enum: [8ball, 9ball], default: 8ball }
          description: Which board to inspect. Defaults to 8ball.
        - name: window
          in: query
          required: false
          schema: { type: string, enum: [30d, 90d, all], default: all }
          description: Ranking window. Defaults to all-time for the admin view.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminLeaderboardResponse" }
        "403":
          description: Admins only.

  /admin/ads:
    get:
      operationId: listAdminAds
      tags: [ads]
      summary: Paginated list of text ads (admin only)
      description: >
        Admin-only. Returns saved text ads newest-first with server-side
        pagination (page/limit) plus the total count, for the admin management
        panel. 403 for non-admins.
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdPage" }
    post:
      operationId: createAd
      tags: [ads]
      summary: Create a text ad (admin only)
      description: >
        Admin-only. Adds a text ad (headline + tagline). 403 for non-admins.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdInput" }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdMutationResult" }

  /admin/ads/{id}:
    delete:
      operationId: deleteAd
      tags: [ads]
      summary: Delete a text ad (admin only)
      description: >
        Admin-only. Removes a text ad permanently. 403 for non-admins. 200 +
        `success:false, reason:"not_found"` when the id doesn't exist.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdMutationResult" }

  /admin/ads/{id}/approve:
    post:
      operationId: approveAd
      tags: [ads]
      summary: Approve a pending user-bought ad (admin only)
      description: >
        Admin-only. Approves a pending_review ad: sets status=approved and
        opens its live window (startAt=now, expiryAt=now+days) so it enters the
        HUD rotation. 403 for non-admins; 200 + success:false/reason on a
        missing or non-pending ad.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdMutationResult" }

  /admin/ads/{id}/deny:
    post:
      operationId: denyAd
      tags: [ads]
      summary: Deny a pending user-bought ad (admin only)
      description: >
        Admin-only. Denies a pending_review ad: sets status=denied so it never
        runs. The payment is intentionally kept (no auto-refund). 403 for
        non-admins; 200 + success:false/reason on a missing or non-pending ad.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result (check `success`; `reason` set on failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdMutationResult" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    AppConfig:
      type: object
      required: [qrUrl, storeUrl, bannedWords]
      properties:
        qrUrl:
          type: string
          description: >
            URL encoded into the splash-art QR easter egg. Configurable via the
            BREAKBPM_PROMO_QR_URL env var so promo links can be swapped at
            runtime; defaults to the marketing site.
        storeUrl:
          type: string
          description: >
            Off-platform card store (Squarespace) URL where buyers can purchase
            the 14 Day Pass by card; the owner then emails a redeem code.
            Configurable via the BREAKBPM_STORE_URL env var; empty string when
            unset, in which case the client hides the card-store callout.
        bannedWords:
          type: array
          items: { type: string }
          description: >
            Owner-curated blocklist (BREAKBPM_BANNED_WORDS), lowercased. The
            client uses it to emoji-swap blocked words in in-game player names at
            the input layer so the cleaned name propagates consistently into the
            shot log. Empty when unset (no filtering). Server surfaces (ad copy,
            screen names) apply their own authoritative filtering separately.

    Account:
      type: object
      required: [id, screenName, createdAt, profileTheme, profileBackground, winsToday]
      properties:
        id: { type: string }
        screenName: { type: string }
        email: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        # Watch-profile background theme preference. "auto" (the default, stored
        # as NULL) derives the splash artwork from the pass's redeem card when
        # the pass carried one; passes with no card (crypto / grant / admin) and
        # "none" render a plain background. A specific variant pins one artwork.
        # Only Lifetime holders / admins can change it. "rainbow" is a
        # name-only flair (rainbow screen name) available to any active pass
        # holder; it pins no felt artwork (felt stays default/auto-earned).
        profileTheme:
          type: string
          enum: [auto, none, rainbow, shark, pool-player, hustler]
        # The concrete artwork the profile currently resolves to, so the Theme
        # picker can preselect it when the stored preference is "auto". Null =
        # plain background (unpaid, "none", or a pass with no redeem card).
        profileBackground:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler]
        # 8-ball wins in the last 24 hours (winner = caller's display name;
        # excludes Shark/Chaos games). Drives the wins-today ball chip on the
        # Account identity card. Always 0 for non-personal contexts.
        winsToday: { type: integer, default: 0 }

    PassSummary:
      type: object
      required: [kind, startedAt, expiresAt, isLifetime]
      properties:
        kind: { type: string, enum: [day, twoweek, month, year, lifetime] }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        isLifetime: { type: boolean }

    SubscriptionSummary:
      type: object
      required: [status, interval, currentPeriodEnd, cancelAtPeriodEnd]
      properties:
        status: { type: string, enum: [active, past_due, canceled] }
        interval: { type: string, enum: [month, year] }
        # Paid-through date. Renews on this date unless cancelAtPeriodEnd is
        # set, in which case access ends here.
        currentPeriodEnd: { type: string, format: date-time }
        cancelAtPeriodEnd: { type: boolean }

    Entitlement:
      type: object
      required: [tier, hasActivePass, historyVisibleLimit, isAdmin]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        hasActivePass: { type: boolean }
        # null means no cap (full history). Number means cap to N most recent.
        historyVisibleLimit: { type: ["integer", "null"] }
        activePass: { $ref: "#/components/schemas/PassSummary" }
        # Present when an active recurring subscription grants entitlement.
        activeSubscription: { $ref: "#/components/schemas/SubscriptionSummary" }
        # True for accounts on the BREAKBPM_ADMIN_EMAILS allowlist. Admins are
        # treated as effective Lifetime holders and unlock the admin code
        # generator. Only this boolean is exposed — never the allowlist itself.
        isAdmin: { type: boolean }

    AdminCode:
      type: object
      required:
        [code, grantsPassKind, maxRedemptions, redemptionCount, createdAt, backgroundVariant]
      properties:
        code: { type: string }
        grantsPassKind: { type: string, enum: [day, twoweek, month, year, lifetime] }
        # null means unlimited redemptions.
        maxRedemptions: { type: ["integer", "null"] }
        redemptionCount: { type: integer }
        createdAt: { type: string, format: date-time }
        # The splash artwork stamped on this code's redeem card and applied to
        # whoever redeems it. Stored at generation (chosen via the admin
        # checkbox), never derived from the code. Null = no artwork.
        backgroundVariant:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler]

    AdminCodeInput:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [day, twoweek, month, year, lifetime] }
        # Optional cap on redemptions. Omit (or null) for unlimited.
        maxRedemptions: { type: ["integer", "null"], minimum: 1 }
        # When true (default), the minted card gets a random splash artwork that
        # is stored on the code and applied to the redeemer's watch profile.
        # When false, the card and profile stay plain (backgroundVariant = null).
        includeArtwork: { type: boolean }

    AdminCodeResult:
      type: object
      required: [code]
      properties:
        code: { $ref: "#/components/schemas/AdminCode" }

    AdminCodeList:
      type: object
      required: [codes]
      properties:
        codes:
          type: array
          items: { $ref: "#/components/schemas/AdminCode" }

    AdminSaleRow:
      type: object
      required:
        [
          id,
          eventType,
          productLabel,
          paymentMethod,
          isComp,
          grossCents,
          gstCents,
          pstCents,
          netCents,
          sourceGrossCents,
          sourceCurrency,
          fxRateMicros,
          providerRef,
          occurredAt,
        ]
      properties:
        id: { type: string }
        userId: { type: ["string", "null"] }
        screenName: { type: ["string", "null"] }
        eventType:
          {
            type: string,
            enum:
              [
                crypto_purchase,
                stripe_purchase,
                subscription_renewal,
                code_redemption,
              ],
          }
        productLabel: { type: string }
        paymentMethod: { type: string, enum: [crypto, stripe, code] }
        isComp: { type: boolean }
        grossCents: { type: integer }
        gstCents: { type: integer }
        pstCents: { type: integer }
        netCents: { type: integer }
        # Currency audit: the original USD amount and the Bank-of-Canada
        # USD→CAD rate (scaled ×1e6) frozen at sale time. CAD figures above are
        # reproducible as round(sourceGrossCents * fxRateMicros / 1e6).
        sourceGrossCents: { type: integer }
        sourceCurrency: { type: string }
        fxRateMicros: { type: integer }
        fxRateDate: { type: ["string", "null"] }
        providerRef: { type: string }
        occurredAt: { type: string, format: date-time }

    AdminSalesTotals:
      type: object
      required:
        [grossCents, gstCents, pstCents, netCents, compCount, rowCount]
      properties:
        # Totals span the full date range (all pages), not just the page shown.
        grossCents: { type: integer }
        gstCents: { type: integer }
        pstCents: { type: integer }
        netCents: { type: integer }
        compCount: { type: integer }
        rowCount: { type: integer }

    AdminSalesResponse:
      type: object
      required: [rows, totals, page, limit, total]
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/AdminSaleRow" }
        totals: { $ref: "#/components/schemas/AdminSalesTotals" }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    AdminLeaderboardRow:
      type: object
      required: [rank, screenName, score, bpm, accuracy, gamesPlayed, trustedGames, provisional]
      properties:
        rank: { type: integer }
        screenName: { type: string }
        # The composite value the board is actually ranked on: recent pace scaled
        # by accuracy and discounted for games against anonymous guests. Hidden
        # from the public leaderboard; admin-only.
        score: { type: number }
        # Display pace (average BPM of the player's best qualifying games).
        bpm: { type: number }
        # Display accuracy (0–100) across those same games; null when none had a
        # usable accuracy.
        accuracy: { type: ["number", "null"] }
        # Count of the player's qualifying games in this mode+window.
        gamesPlayed: { type: integer }
        # Of those qualifying games, how many had two registered participants
        # (vs one registered player against an anonymous guest seat).
        trustedGames: { type: integer }
        # True when the player has too few qualifying games to be "established"
        # — a thin-sample warning so admins can scrutinize early ranks.
        provisional: { type: boolean }

    AdminLeaderboardResponse:
      type: object
      required: [mode, window, rows]
      properties:
        mode: { type: string, enum: [8ball, 9ball] }
        window: { type: string, enum: [30d, 90d, all] }
        rows:
          type: array
          items: { $ref: "#/components/schemas/AdminLeaderboardRow" }

    Plan:
      type: object
      required: [id, name, priceCents, description, kind]
      properties:
        id: { type: string, enum: [day, monthly, yearly, lifetime] }
        name: { type: string }
        priceCents: { type: integer }
        description: { type: string }
        # "pass" = one-time purchase; "subscription" = recurring.
        kind: { type: string, enum: [pass, subscription] }
        # Present for one-time passes — the pass kind to issue.
        passKind: { type: string, enum: [day, lifetime] }
        # Present for subscriptions — the billing interval.
        interval: { type: string, enum: [month, year] }

    LuckyBreakInfo:
      type: object
      required: [priceCents, lifetimeProbability, windowDays]
      properties:
        priceCents: { type: integer }
        # Disclosed odds of a Lifetime upgrade (0.2 = 20%). The other rolls
        # land on the guaranteed Monthly floor.
        lifetimeProbability: { type: number }
        # Days of shot history used to SEED the draw (entropy, not odds).
        windowDays: { type: integer }

    PlanCatalog:
      type: object
      required: [plans, cardPaymentsEnabled, luckyBreak, crypto]
      properties:
        plans:
          type: array
          items: { $ref: "#/components/schemas/Plan" }
        # When false, in-app card checkout + subscription endpoints are turned
        # off (see BREAKBPM_CARD_PAYMENTS_ENABLED). The client hides the card
        # purchase UI and leads with Lucky Break + redeem codes.
        cardPaymentsEnabled: { type: boolean }
        luckyBreak: { $ref: "#/components/schemas/LuckyBreakInfo" }
        # Self-custody on-chain crypto checkout terms. `enabled` reflects both
        # the feature flag AND a configured receiving wallet.
        crypto: { $ref: "#/components/schemas/CryptoCatalog" }

    CryptoPassPlanInfo:
      type: object
      required: [passKind, name, priceCents]
      properties:
        # "lucky_break" runs the seeded draw on payment instead of granting a
        # fixed pass (guaranteed Monthly floor, fixed-odds Lifetime).
        passKind: { type: string, enum: [day, month, year, lifetime, lucky_break] }
        name: { type: string }
        priceCents: { type: integer }

    CryptoCatalog:
      type: object
      required: [enabled, network, chainId, assets, passes]
      properties:
        # True only when crypto payments are flagged on AND a receiving wallet
        # is configured. The client hides the crypto panel when false.
        enabled: { type: boolean }
        network: { type: string, enum: [base, base-sepolia] }
        chainId: { type: integer }
        assets:
          type: array
          items: { type: string, enum: [usdc, eth] }
        passes:
          type: array
          items: { $ref: "#/components/schemas/CryptoPassPlanInfo" }

    CryptoQuoteInput:
      type: object
      required: [passKind, asset]
      properties:
        passKind: { type: string, enum: [day, month, year, lifetime, lucky_break] }
        asset: { type: string, enum: [usdc, eth] }
        # Optional connect-wallet shortcut. Supply all three to bind the order
        # to this payer (the settling tx must originate here). OMIT all three
        # for a "manual" order — payable from ANY wallet (mobile or desktop) by
        # sending the returned unique exact amount to the receiving address via
        # QR / copy. The manual flow is the default; this is just a one-click
        # path for users with a browser-extension wallet.
        payerAddress: { type: string, minLength: 42, maxLength: 42 }
        # Wallet signature over the canonical checkout message, proving the
        # caller controls payerAddress (stops claiming someone else's payment).
        signature: { type: string }
        # Unix seconds when the message was signed (signature freshness window).
        issuedAt: { type: integer }

    CryptoOrderQuote:
      type: object
      required:
        [id, passKind, asset, network, chainId, receivingAddress, expectedAmount, decimals, displayAmount, priceCents, expiresAt, manual]
      properties:
        id: { type: string }
        # True when the order is NOT bound to a specific payer: pay by sending
        # the exact unique `expectedAmount` to `receivingAddress` from any
        # wallet (the client renders address + amount + QR). False for the
        # connect-wallet shortcut (a specific payer is bound).
        manual: { type: boolean }
        passKind: { type: string, enum: [day, month, year, lifetime, lucky_break] }
        asset: { type: string, enum: [usdc, eth] }
        network: { type: string, enum: [base, base-sepolia] }
        chainId: { type: integer }
        receivingAddress: { type: string }
        # ERC-20 contract for USDC; null for native ETH.
        tokenAddress: { type: ["string", "null"] }
        # Atomic units to send, as a decimal string (wei / 6-dec USDC units).
        expectedAmount: { type: string }
        # Decimals of the asset (18 for ETH, 6 for USDC) — for client display.
        decimals: { type: integer }
        # Human-readable amount + symbol, e.g. "0.00213 ETH" or "1.99 USDC".
        displayAmount: { type: string }
        priceCents: { type: integer }
        expiresAt: { type: string, format: date-time }

    CryptoQuoteResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        order: { $ref: "#/components/schemas/CryptoOrderQuote" }

    CryptoVerifyInput:
      type: object
      required: [orderId]
      properties:
        orderId: { type: string, minLength: 1, maxLength: 64 }
        # Optional for manual USDC orders — the server auto-detects the incoming
        # transfer by its unique exact amount, so the client can poll with just
        # the orderId. Required for ETH and connect-wallet orders, and accepted
        # for any order as a manual recovery path (paste the tx hash).
        txHash: { type: string, minLength: 66, maxLength: 66 }

    CryptoVerifyResult:
      type: object
      required: [success, status, message]
      properties:
        success: { type: boolean }
        # granted = pass issued; pending = mined but awaiting confirmations
        # (keep polling); not_found = tx not seen yet; mismatch = wrong
        # recipient/payer/amount; failed = reverted/other; expired = quote
        # lapsed before payment.
        status:
          type: string
          enum: [granted, pending, not_found, mismatch, failed, expired]
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }
        # Present when status=pending.
        confirmations: { type: integer }
        needed: { type: integer }
        # Present only when the order was a Lucky Break purchase — the won roll,
        # so the client can play the "rolling the rack" reveal on the result.
        luckyBreak: { $ref: "#/components/schemas/LuckyBreakResult" }
        # Present only when the order was a HUD-ad purchase — the created ad
        # (status pending_review), so the buyer sees it landed in moderation.
        ad: { $ref: "#/components/schemas/AdSummary" }

    SubscriptionCheckoutInput:
      type: object
      required: [interval]
      properties:
        interval: { type: string, enum: [month, year] }

    SubscriptionVerifyResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        subscription: { $ref: "#/components/schemas/SubscriptionSummary" }

    CancelSubscriptionResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        subscription: { $ref: "#/components/schemas/SubscriptionSummary" }

    MeResponse:
      type: object
      required: [signedIn, entitlement, needsOnboarding]
      properties:
        signedIn: { type: boolean }
        # True when the user is signed-in but hasn't confirmed a screen name
        # yet — the client should mount the onboarding gate before app entry.
        needsOnboarding: { type: boolean }
        account: { $ref: "#/components/schemas/Account" }
        entitlement: { $ref: "#/components/schemas/Entitlement" }
        passes:
          type: array
          items: { $ref: "#/components/schemas/PassSummary" }
        # The signed-in caller's own standing in the all-time global BPM
        # leaderboard (same ranking the /leaderboard "all" window shows), so
        # the Account page can render the Identity card like a leaderboard row
        # with the player's global rank. Omitted when the caller isn't ranked
        # yet (too few qualifying games) or for signed-out callers.
        globalStanding: { $ref: "#/components/schemas/LeaderboardRow" }

    ScreenNameUpdate:
      type: object
      required: [screenName]
      properties:
        screenName: { type: string, minLength: 1, maxLength: 32 }

    ProfileThemeUpdate:
      type: object
      required: [profileTheme]
      properties:
        # "auto" clears the override (derive from the pass's redeem card, else
        # plain); "none" = plain background; "rainbow" = name-only rainbow flair
        # (felt stays default/auto-earned); otherwise a specific splash artwork.
        profileTheme:
          type: string
          enum: [auto, none, rainbow, shark, pool-player, hustler]

    DiscountRedeemInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }

    LuckyBreakResult:
      type: object
      required: [outcome, lifetimeProbability, windowDays]
      properties:
        # The tier won by this roll. "month" is the guaranteed floor.
        outcome: { type: string, enum: [month, lifetime] }
        lifetimeProbability: { type: number }
        windowDays: { type: integer }
        # SHA-256 of the seed (shot data | redemption id) — lets the player
        # verify the draw was not tampered with after the fact.
        seedHash: { type: string }
        # How many shots from the window seeded this particular draw.
        seededShotCount: { type: integer }

    RedeemResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }
        # Present only when the redeemed code was a Lucky Break roll.
        luckyBreak: { $ref: "#/components/schemas/LuckyBreakResult" }

    FreePassClaimResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # Which reward this claim drew. Present on success.
        rewardKind: { type: string, enum: [lucky_break, day] }
        # The granted pass + (for a Lucky Break draw) the roll — same shape as
        # /passes/redeem so the client reuses the redeem/reveal rendering,
        # including the "rolling the rack" reveal when rewardKind=lucky_break.
        pass: { $ref: "#/components/schemas/PassSummary" }
        luckyBreak: { $ref: "#/components/schemas/LuckyBreakResult" }
        # Machine-readable refusal reason on success:false, so the client can
        # branch its UI (closed-for-the-month vs already-claimed vs has-pass).
        reason:
          type: string
          enum: [pool_empty, already_claimed, has_pass]

    FreePassClaimStatus:
      type: object
      required:
        [open, periodKey, monthlyCap, remainingLuckyBreak, remainingDay, signedIn]
      properties:
        # True when at least one reward pool still has stock this period.
        open: { type: boolean }
        # Calendar period these counts apply to, e.g. "2026-06".
        periodKey: { type: string }
        # Per-pool monthly cap, so the client can render "N of M left".
        monthlyCap: { type: integer }
        # Remaining stock in each pool this period (clamped to >= 0).
        remainingLuckyBreak: { type: integer }
        remainingDay: { type: integer }
        # True when the caller is signed in — the fields below are meaningful
        # only then (false/omitted for anonymous callers).
        signedIn: { type: boolean }
        # The signed-in caller has already used their one lifetime claim.
        alreadyClaimed: { type: boolean }
        # The signed-in caller can claim right now (signed in, no prior claim,
        # no active pass, and stock remains).
        eligible: { type: boolean }

    PassCheckoutInput:
      type: object
      required: [kind]
      properties:
        # Only one-time passes are purchasable. The former one-time "year" pass
        # is replaced by the Yearly subscription, so it is no longer accepted
        # here (legacy year-pass rows still resolve entitlement, but no new ones
        # can be bought).
        kind: { type: string, enum: [day, lifetime] }

    CheckoutResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # Provider-issued opaque token. Hand this to /passes/verify to
        # complete the purchase. Absent when success=false.
        opaqueToken: { type: string }
        # Optional URL to redirect the user to (e.g. Stripe Checkout).
        checkoutUrl: { type: string }

    VerifyCheckoutInput:
      type: object
      required: [opaqueToken]
      properties:
        opaqueToken: { type: string, minLength: 1, maxLength: 512 }

    VerifyResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }

    StartGameInput:
      type: object
      required: [gameType]
      properties:
        # Stored on the in-progress row so the inactivity sweep can exempt
        # practice mode (no opponent, no win condition → no forfeit).
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        # Total human-player slots for this game. Used by the join flow to
        # cap how many participants can be allocated. Defaults vary by
        # game type (1 for practice, 2 for versus).
        maxPlayers: { type: integer, minimum: 1, maximum: 4 }
        # Resolved @mention links the host attached to non-host player slots.
        # Each names a registered user (by their canonical screen name) the
        # host wants to attribute this game to. The server re-validates every
        # one (host must be a paid signed-in tier; no self-mention; recipient
        # must exist and be under their pending-invite cap) and silently skips
        # any that fail. On a valid mention a PENDING invite is created — the
        # game never auto-counts for the recipient until they Accept it.
        mentions:
          type: array
          items:
            type: object
            required: [slotIndex, screenName]
            properties:
              # gameState player slot this mention occupies (1-based human
              # slots; slot 0 is always the host). The recipient's display
              # name in the game equals `screenName`, so Accept can recreate
              # the exact per-slot attribution from the shot log.
              slotIndex: { type: integer, minimum: 1, maximum: 3 }
              screenName: { type: string }

    StartGameResult:
      type: object
      required: [allowed, tier]
      properties:
        allowed: { type: boolean }
        tier: { type: string, enum: [public, account, pass] }
        # Server-issued game id (signed-in users only). Use it for
        # /games/activity and to update the same row on /games/save.
        gameId: { type: ["string", "null"] }
        # Canonical 5-char share code (signed-in users only). For
        # anonymous games this is null and the client falls back to its
        # locally-generated code.
        shareCode: { type: ["string", "null"] }
        # Total human-player slots the server allocated for this game.
        maxPlayers: { type: ["integer", "null"] }
        # How long the server will tolerate inactivity before auto-forfeit
        # (signed-in users). Anonymous play has its own client-side cap.
        inactivityTimeoutMs: { type: integer }
        # Hard wall-clock cap for anonymous play. Null for signed-in users
        # (who use the inactivity timeout instead).
        maxGameDurationMs: { type: ["integer", "null"] }

    GameActivityInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }
        # Optional snapshot of the current client-side game state. When
        # provided, the server stashes it on the in-progress row so
        # /games/resume can hand it back on a different device / cleared
        # browser. Omit to leave the previous snapshot intact.
        gameState: {}

    ResumableGame:
      type: object
      required: [gameId, gameType, startedAt, lastActivityAt, gameState]
      properties:
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        startedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        # Most recent client-side snapshot (whatever the client last
        # posted via /games/activity). May be an empty object if no
        # snapshot has been recorded yet.
        gameState: {}

    ResumableGameResponse:
      type: object
      required: [resumable]
      properties:
        resumable: { type: boolean }
        game: { $ref: "#/components/schemas/ResumableGame" }

    AbandonGameInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }

    AbandonGameResult:
      type: object
      required: [abandoned]
      properties:
        abandoned: { type: boolean }
        message: { type: string }

    GameActivityResult:
      type: object
      required: [alive]
      properties:
        # False if the game was already auto-forfeited or no longer exists.
        # The client should stop logging activity and show the forfeit state.
        alive: { type: boolean }
        message: { type: string }

    GameSaveInput:
      type: object
      required: [shareCode, gameType, durationMs, sunkBallsCount, outcome, gameState, startedAt]
      properties:
        # If set, finalize this in-progress server-side game row.
        gameId: { type: ["string", "null"] }
        shareCode: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        winner: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        # Final shooting accuracy as a whole-number percentage (0–100) for
        # the winner (or the human in Shark mode), the same player `bpm` is
        # saved for. Null when no qualifying shots were taken.
        accuracy: { type: ["integer", "null"], minimum: 0, maximum: 100 }
        # Per-participant final accuracy, keyed by the player's slot index
        # (slot 0 is the host). Each entry's accuracy is computed from the
        # shots the host logged under that slot's player. Persisted on
        # game_participants so a joiner sees their OWN accuracy in history,
        # not the host/winner's. Optional for backward compatibility; when
        # omitted, only the row-level `accuracy` above is stored.
        participantAccuracies:
          type: array
          items:
            type: object
            required: [slotIndex, accuracy]
            properties:
              slotIndex: { type: integer, minimum: 0 }
              accuracy: { type: ["integer", "null"], minimum: 0, maximum: 100 }
        durationMs: { type: integer, minimum: 0 }
        sunkBallsCount: { type: integer, minimum: 0 }
        # `expired` is used when a practice session hits the 1-hour hard
        # wall-clock cap (no winner). Versus modes that hit the same cap
        # use `forfeit` (with a winner derived from whose turn it was).
        outcome: { type: string, enum: [won, lost, forfeit, completed, expired] }
        gameState: {}
        startedAt: { type: string, format: date-time }

    SaveGameResult:
      type: object
      required: [saved]
      properties:
        saved: { type: boolean }
        gameId: { type: string }
        message: { type: string }
        # True when the server refused to overwrite the row because it
        # was already finalized by the periodic sweep (hard 1-hour cap
        # or 60-min inactivity). The client should treat the game as
        # ended-by-server, drop its in-progress checkpoint, and NOT
        # retry the save. `endReason` identifies why.
        alreadyEnded: { type: boolean }
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]

    GameHistoryEntry:
      type: object
      required: [id, gameType, outcome, durationMs, sunkBallsCount, endedAt, sharkMode]
      properties:
        id: { type: string }
        gameType: { type: string }
        winner: { type: ["string", "null"] }
        # The opposing player to render after "vs." — for a loss this is the
        # player (or team representative) who won; for a win it is the defeated
        # opponent. Null for solo/practice and Shark games (the card shows a
        # dedicated Shark label instead).
        opponent: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        # The viewing caller's OWN final shooting accuracy as a whole-number
        # percentage (0–100). Resolved from their game_participants row when
        # present (so a joiner sees their own accuracy), falling back to the
        # row-level winner/host accuracy for legacy rows. Null when not recorded.
        accuracy: { type: ["integer", "null"] }
        durationMs: { type: integer }
        sunkBallsCount: { type: integer }
        # Subject-relative result for the player whose history this is:
        # `won`/`lost` reflect whether THAT player (or their team) won, not who
        # won in absolute terms. `forfeit`/`completed`/`expired` are preserved
        # as stored. Drives the WIN/LOSS/DNF badge on the history card.
        outcome: { type: string }
        shareCode: { type: string }
        endedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        sharkMode: { type: boolean }
        # Chaos / None multiplayer-8-ball play mode (no solids/stripes teams).
        # `eight-last`/`anything-goes` are Chaos win rules; `none` is the
        # no-winner free shoot-around. Null for normal team games, Shark,
        # Practice, and 9-ball. Drives the CLEARED / rainbow WIN-LOSS badge.
        chaosMode:
          type: ["string", "null"]
          enum: [eight-last, anything-goes, none, null]
        # Set when this row was auto-finalized by the server sweep.
        # Distinguishes the 1-hour hard wall-clock cap (`max_duration_60min`)
        # from the 60-min inactivity forfeit (`inactivity_60min`) so the
        # UI can label the reason instead of just showing "forfeit".
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]
        # Balls in the exact order they were pocketed during the game
        # (pocketing events only — sinks plus a terminal win/lose that
        # pocketed a ball). Drives the visual shot-log row in history.
        # `player` is the display name of whoever sank it; the invisible
        # Shark opponent appears as the literal name "Shark".
        pocketSequence:
          type: array
          items:
            type: object
            required: [ball, player]
            properties:
              ball: { type: integer }
              player: { type: string }
        # The HOST's resolved profile theme/background for THIS game, so every
        # player's history card tints its felt to the host's table — the same
        # rule the host's own GameScreen and live spectators use (shark → blue,
        # hustler → red, pool-player → purple, else the default green). "auto"
        # hosts derive it from their pass's redeem card; an explicit Theme
        # override pins one. Null/"none"/unpaid → default green felt.
        hostTheme:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler, none]

    MentionResolveResult:
      type: object
      required: [eligible, found, atCap]
      properties:
        # False when the caller isn't a paid signed-in host. The client gates
        # the @mention affordance on its own entitlement, but the server also
        # refuses to resolve for ineligible callers (defense in depth).
        eligible: { type: boolean }
        # True when the handle maps to a real, non-self user.
        found: { type: boolean }
        # The canonical screen name for the matched user (the exact casing to
        # display and to store as the slot display name). Null when not found.
        screenName: { type: ["string", "null"] }
        # True when the matched recipient is already at their pending-invite
        # cap (3 free / 6 paid) — drives the "Invite List Full :(" message.
        atCap: { type: boolean }

    GameInvite:
      type: object
      required: [id, status, invitedBy, createdAt, game]
      properties:
        id: { type: string }
        status: { type: string, enum: [pending, accepted, declined] }
        # Screen name of the host who added the recipient to this game.
        invitedBy: { type: string }
        createdAt: { type: string, format: date-time }
        # The finished game's summary, shaped exactly like a history entry and
        # made subject-relative to the recipient's mentioned slot.
        game: { $ref: "#/components/schemas/GameHistoryEntry" }

    GameInviteList:
      type: object
      required: [invites]
      properties:
        invites:
          type: array
          items: { $ref: "#/components/schemas/GameInvite" }

    AcceptInviteResult:
      type: object
      required: [accepted, gameId]
      properties:
        accepted: { type: boolean }
        gameId: { type: string }
        # Set when the invite could not be accepted (e.g. the target slot was
        # taken by a code-joiner in the meantime). The client shows a message.
        reason: { type: ["string", "null"] }

    RemoveInviteResult:
      type: object
      required: [removed]
      properties:
        removed: { type: boolean }

    GeneratedDiscountCode:
      type: object
      required: [code, grantsPassKind, issuedAt, expiresAt, redeemed, expired]
      properties:
        code: { type: string }
        grantsPassKind: { type: string, enum: [day, year, lifetime] }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        # True when the unique redemption has been consumed.
        redeemed: { type: boolean }
        # True when expiresAt is in the past (covers both natural 24h
        # expiry and supersession by a newer code).
        expired: { type: boolean }

    MyGiftCodesResult:
      type: object
      required: [eligible, codes, cooldownActive]
      properties:
        # False for users without an active Year or Lifetime pass — the
        # client uses this to hide the gift section entirely.
        eligible: { type: boolean }
        # Newest-first list of the caller's recent gift codes.
        codes:
          type: array
          items: { $ref: "#/components/schemas/GeneratedDiscountCode" }
        cooldownActive: { type: boolean }
        # When the next generation will be allowed. Null when no codes
        # have been generated yet.
        nextAvailableAt: { type: ["string", "null"], format: date-time }

    GiftCodeIssueResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # The newly-issued code (only present on success).
        code: { $ref: "#/components/schemas/GeneratedDiscountCode" }
        # Always set, including on success — the next allowed generation
        # timestamp so the client can show the cooldown immediately.
        nextAvailableAt: { type: string, format: date-time }

    ResolveShareCodeInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 5, maxLength: 5 }

    ResolveShareCodeResult:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        # Set when found=false. "not_found" | "ended" | "rate_limited"
        reason: { type: string }
        # Present when found=true.
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        maxPlayers: { type: integer }
        filledSlots: { type: integer }
        # True for practice / shark — joiners are spectator-only.
        soloMode: { type: boolean }
        hostName: { type: string }

    ResolveWatchByNameResult:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        # Set when found=false. "not_found" (no such screen name) |
        # "not_live" (host has no in-progress game) | "rate_limited".
        reason: { type: string }
        # Present when found=true — the live game's canonical share code,
        # which the spectator view polls via /games/state.
        shareCode: { type: string }
        # Present when found=true — the resolved host's canonical screen name.
        hostName: { type: string }

    JoinGameInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 5, maxLength: 5 }
        # Optional display name for guest (anonymous) joiners. Signed-in
        # callers always use their screenName; this is ignored for them.
        guestName: { type: string, minLength: 1, maxLength: 24 }
        # Capability token from a prior /games/join on this device.
        # When present and matches a non-left participant in this game,
        # the server returns that existing slot instead of allocating a
        # new one. Makes guest rejoin (e.g. after a tab refresh)
        # idempotent so a single guest never holds two slots.
        guestToken: { type: string }
        # View-only intent (the persistent /watch/{name} link). When true
        # the server NEVER allocates a player slot — it short-circuits to
        # the read-only "spectator" role (still subject to the host having
        # spectating enabled). Existing participants are still recognized so
        # a host opening their own watch link is redirected out, not mirrored.
        spectatorOnly: { type: boolean }

    JoinGameResult:
      type: object
      required: [joined, role, gameId]
      properties:
        joined: { type: boolean }
        # "player" → assigned to a slot; "spectator" → view-only;
        # "already_joined" → caller already holds a slot in this game.
        role: { type: string, enum: [player, spectator, already_joined] }
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        # Slot index (0-based). Null for spectators.
        slotIndex: { type: ["integer", "null"] }
        displayName: { type: string }
        # Echo of the canonical share code so the client can build the
        # /games/state poll URL.
        shareCode: { type: string }
        # Set when joined=false. "not_found" | "ended" | "rate_limited"
        # | "spectators_disabled" (host lacks an active pass/subscription,
        # so the view-only spectator role is unavailable). Also set on
        # successful spectator joins to explain why ("in_progress" | "full")
        # or on idempotent rejoins ("host" | "rejoin").
        reason: { type: string }
        # Capability token for guest (anonymous) joiners — they don't
        # have a userId, so they pass this token back on /games/leave
        # to forfeit their own slot. Null for signed-in callers.
        guestToken: { type: ["string", "null"] }

    LeaveGameInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }
        # Required for guest joiners; ignored for signed-in callers
        # (who authenticate via Clerk and are matched by userId).
        guestToken: { type: string }

    LeaveGameResult:
      type: object
      required: [left]
      properties:
        left: { type: boolean }
        # True when this departure also ended the game (forfeit).
        gameEnded: { type: boolean }

    GameStateSnapshot:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        ended: { type: boolean }
        startedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        gameState: {}
        # The host's resolved profile theme/background, so joiners and
        # spectators can tint the view-only HUD felt to match the host's
        # table (shark → blue, hustler → red, else the default green).
        # "auto" hosts derive it from their pass's redeem card; an explicit
        # Theme override pins one. Null/"none"/unpaid → default green felt.
        hostTheme:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler, none]
        participants:
          type: array
          items:
            type: object
            required: [slotIndex, displayName, isHost, hasLeft, isAdmin, rainbowName]
            properties:
              slotIndex: { type: integer }
              displayName: { type: string }
              isHost: { type: boolean }
              hasLeft: { type: boolean }
              isGuest: { type: boolean }
              # Whether this participant's account email is on the admin
              # allowlist. Resolved server-side per response; the email list
              # itself is never sent to clients.
              isAdmin: { type: boolean }
              # Whether this participant's name renders with the rainbow flair:
              # true for admins, or active pass holders whose profileTheme is
              # "rainbow". Resolved server-side per response.
              rainbowName: { type: boolean }

    GameHistoryResponse:
      type: object
      required: [tier, totalCount, visibleCount, games, truncated, page, totalPages]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        totalCount: { type: integer }
        visibleCount: { type: integer }
        truncated: { type: boolean }
        # Current page number (always 1 for free accounts).
        page: { type: integer }
        # Total number of pages (always 1 for free accounts).
        totalPages: { type: integer }
        games:
          type: array
          items: { $ref: "#/components/schemas/GameHistoryEntry" }

    DeleteGameDataResult:
      type: object
      required: [deleted, deletedGames, anonymizedGames]
      properties:
        deleted: { type: boolean }
        # Number of games fully deleted (no other real player remained).
        deletedGames: { type: integer }
        # Number of games where the caller was anonymized to "Mr. X" because
        # other real players still had a stake in them.
        anonymizedGames: { type: integer }

    PublicProfileResult:
      type: object
      required: [found, games]
      properties:
        found: { type: boolean }
        # Why the lookup failed (only present when found is false).
        reason: { type: string, enum: [not_found, rate_limited] }
        # Canonical screen name (original casing) when found.
        screenName: { type: ["string", "null"] }
        # Account creation date. Null for legacy users with no recorded
        # createdAt — the header simply omits the "member since" line then.
        memberSince: { type: ["string", "null"], format: date-time }
        # All-time count of completed non-practice games. Null when not found.
        gamesPlayed: { type: ["integer", "null"] }
        # Fraction of non-practice completed games (with a decisive winner)
        # that the player won, all-time. Null when no qualifying games.
        winRate: { type: ["number", "null"] }
        # Average BPM across the last 5 completed games (same set shown in the
        # profile). Null when none of those games have a recorded BPM.
        avgBpm: { type: ["number", "null"] }
        # True when this player is an admin.
        isAdmin: { type: boolean }
        # Whether this profile's name renders with the rainbow flair: true for
        # admins, or active pass holders whose profileTheme is "rainbow".
        rainbowName: { type: boolean }
        # The splash artwork to render behind this profile's stats. Resolved
        # server-side from the player's pass (matching their redeem card) or
        # their stored Theme override. Null for unpaid players or a "none"
        # override — the profile keeps the plain default background.
        profileBackground:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler]
        # Up to the five most recent completed games, newest-first. Same
        # shape (and rendered with the same cards) as the owner's own
        # account history. Empty when found is false.
        games:
          type: array
          items: { $ref: "#/components/schemas/GameHistoryEntry" }
        # The player's full last-24h stats, shaped exactly like the /stats
        # response so the profile can render the same CRT hero readout. Always
        # personal scope, 24h window. Null when the player wasn't found.
        stats:
          oneOf:
            - { $ref: "#/components/schemas/StatsResult" }
            - { type: "null" }
        # This player's own row in the all-time global BPM ranking, so the
        # profile can render the same single standing card the owner sees on
        # their account page. Omitted when the player has too few qualifying
        # ranked games to appear in the leaderboard.
        globalStanding: { $ref: "#/components/schemas/LeaderboardRow" }

    StatBall:
      type: object
      required: [ball, count]
      properties:
        ball: { type: integer }
        count: { type: integer }

    StatPlayTime:
      type: object
      required: [gameType, avgDurationMs, gameCount]
      properties:
        gameType: { type: string, enum: [8ball, 9ball, practice, shark] }
        avgDurationMs: { type: integer }
        gameCount: { type: integer }

    StatTrendPoint:
      type: object
      required: [bpm, accuracy]
      properties:
        # This game's per-player BPM, or null when the game produced no BPM.
        bpm: { type: ["number", "null"] }
        # This game's accuracy percentage (0–100), or null when no qualifying shots.
        accuracy: { type: ["number", "null"] }

    StatsResult:
      type: object
      required:
        [
          tier,
          scope,
          window,
          appliedScope,
          appliedWindow,
          canChooseWindow,
          canToggleGlobal,
          canRefresh,
          cached,
          gamesPlayed,
          totalShots,
          totalMisses,
          totalFouls,
          totalSafeties,
          totalUndos,
          avgShotsPerGame,
          avgMissesPerGame,
          avgFoulsPerGame,
          avgSafetiesPerGame,
          playTimeByType,
          topBalls,
          trend,
          sharkLevel,
          chaosWinRecent,
          winsToday,
        ]
      properties:
        # The caller's resolved entitlement tier.
        tier: { type: string, enum: [public, account, pass] }
        # Echo of the scope/window the client requested.
        scope: { type: string, enum: [personal, global] }
        window: { type: string, enum: [24h, 30d, 365d, all] }
        # What the server actually served after clamping to the caller's
        # tier (anonymous → global+24h; no-pass → personal+24h).
        appliedScope: { type: string, enum: [personal, global] }
        appliedWindow: { type: string, enum: [24h, 30d, 365d, all] }
        # UI capability flags, derived from tier, so the client doesn't
        # re-implement the gating rules.
        canChooseWindow: { type: boolean }
        canToggleGlobal: { type: boolean }
        canRefresh: { type: boolean }
        # True when this response was served from the 1-hour cache rather
        # than freshly computed.
        cached: { type: boolean }
        # ISO timestamp the served snapshot was computed at.
        computedAt: { type: string, format: date-time }

        # ── Results ──
        gamesPlayed: { type: integer }
        # Personal scope only — fraction of completed non-practice games the
        # caller won. Null in global scope (meaningless there).
        winRate: { type: ["number", "null"] }
        # Global scope only — fraction of completed games that ended in a
        # clean win (vs forfeit/abandonment), from the outcome field. Null
        # in personal scope.
        finishRate: { type: ["number", "null"] }
        # 8-ball games that actually ended on an 8-ball shot. Null when there
        # are no qualifying 8-ball games in the scope/window.
        eightBallSinkRate: { type: ["number", "null"] }
        eightBallDecidedGames: { type: integer }

        # ── Shooting ──
        # Whole-number percentage (0–100). Null when no qualifying shots.
        accuracy: { type: ["integer", "null"] }
        bestAccuracy: { type: ["integer", "null"] }
        totalShots: { type: integer }
        totalMisses: { type: integer }
        totalFouls: { type: integer }
        totalSafeties: { type: integer }
        totalUndos: { type: integer }
        avgShotsPerGame: { type: number }
        avgMissesPerGame: { type: number }
        avgFoulsPerGame: { type: number }
        avgSafetiesPerGame: { type: number }

        # ── Pace ──
        # Mean / peak per-game BPM. Null when no game has a BPM yet.
        avgBpm: { type: ["number", "null"] }
        bestBpm: { type: ["number", "null"] }
        # Global 24h average BPM across all players, for comparison. Only
        # populated for personal-scope responses so the client can show an
        # above/below-average arrow. Null for global scope or when there is
        # no qualifying global data yet.
        globalAvgBpm: { type: ["number", "null"] }
        # Aligned per-game trend for up to the last 24 games in the scope/window,
        # ordered oldest→newest so a chart reads left-to-right as time progresses.
        # One entry per game (in lockstep): each carries that game's BPM and
        # accuracy percentage, either of which may be null when the game produced
        # no value for that series. A game is included when it has at least one
        # non-null value; empty when none. Indexes correspond across both series
        # so the two lines can be overlaid game-for-game.
        trend:
          type: array
          items: { $ref: "#/components/schemas/StatTrendPoint" }
        playTimeByType:
          type: array
          items: { $ref: "#/components/schemas/StatPlayTime" }

        # ── Ball patterns (personal scope only) ──
        topBalls:
          type: array
          items: { $ref: "#/components/schemas/StatBall" }
        # Solids vs stripes split across 8-ball games where a group was
        # locked in. Null when there are no such games.
        solidsCount: { type: integer }
        stripesCount: { type: integer }
        # Shark-mode wins / total shark games. Null when no shark games.
        sharkWinRate: { type: ["number", "null"] }
        sharkGames: { type: integer }
        # All-time count of the caller's Shark-mode WINS — games they beat the
        # Shark in, not every Shark game played (window-independent). Null in
        # global scope; 0 when the user has none.
        sharkLevel: { type: ["integer", "null"] }
        # Cosmetic flag: true when the caller WON at least one Chaos ("No Rules")
        # game within their 10 most-recent completed games (window-independent).
        # Drives the rainbow AVG-BPM flourish on the Stats hero. Always false in
        # global scope.
        chaosWinRecent: { type: boolean }
        # 8-ball wins in the last 24 hours for this player (personal scope only;
        # 0 for global scope). Drives the wins-today ball chip on the hero.
        winsToday: { type: integer, default: 0 }

    LeaderboardRow:
      type: object
      required: [rank, screenName, bpm, accuracy, gamesPlayed, sharkLevel, profileBackground, winsToday, rainbowName]
      properties:
        # 1-indexed standing within the ranking (after sorting by bpm desc).
        rank: { type: integer }
        # The player's canonical screen name — also the /watch/{name} key.
        screenName: { type: string }
        # The ranking score: average pace (balls per minute) across the
        # player's best qualifying games in the window.
        bpm: { type: number }
        # Average shooting accuracy (0–100) across those same games. Null when
        # none of them recorded a usable accuracy.
        accuracy: { type: ["number", "null"] }
        # Count of the player's qualifying games in the window.
        gamesPlayed: { type: integer }
        # All-time count of the player's Shark-mode WINS — games they beat the
        # Shark in, not every Shark game played (window-independent), matching
        # the profile `sharkLevel`. 0 when they have none.
        sharkLevel: { type: integer }
        # The player's resolved profile theme/background (same resolution the
        # watch profile uses), so the client can tint the leaderboard card to
        # their theme color. Null = no theme (unpaid / "none") → green default.
        profileBackground:
          type: ["string", "null"]
          enum: [shark, pool-player, hustler]
        # 8-ball wins in the last 24 hours for this player. Drives the
        # wins-today ball chip on each leaderboard card.
        winsToday: { type: integer, default: 0 }
        # Whether to render this player's name with the rainbow flair: true for
        # admins, or active pass holders (one-time pass or subscription) whose
        # profileTheme is "rainbow". Resolved server-side per response.
        rainbowName: { type: boolean }

    LeaderboardResult:
      type: object
      required: [mode, window, page, pageSize, totalPlayers, totalPages, rows]
      properties:
        # Which board these rows rank (echoes the request; defaults to 8ball).
        mode: { type: string, enum: [8ball, 9ball] }
        window: { type: string, enum: [30d, 90d, all] }
        page: { type: integer }
        pageSize: { type: integer }
        # Total number of ranked players for this mode+window (across all pages).
        totalPlayers: { type: integer }
        totalPages: { type: integer }
        # The requested page of ranked players, in rank order.
        rows:
          type: array
          items: { $ref: "#/components/schemas/LeaderboardRow" }

    FindPlayerPost:
      type: object
      required: [id, displayName, userName, tableNumber, scheduledAt, cancelled, isOwn]
      properties:
        id: { type: string }
        # "USERNAME, Table #" — the post's public display name.
        displayName: { type: string }
        # The creator's screen name (without the table suffix).
        userName: { type: string }
        tableNumber: { type: integer }
        # Latitude/longitude in WGS84. Null for cancelled posts (place hidden).
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        # UTC meetup time. Null for cancelled posts (time hidden). Never
        # surfaced to the user as UTC — the client renders the wall-clock value.
        scheduledAt: { type: ["string", "null"], format: date-time }
        cancelled: { type: boolean }
        # True when the caller owns this post (so the UI can show "Cancel").
        isOwn: { type: boolean }
        # Reverse-geocoded human label e.g. "Los Angeles, United States".
        # Null for cancelled posts (place hidden) or if geocoding failed.
        locationLabel: { type: ["string", "null"] }

    FindPlayerPostsResult:
      type: object
      required: [signedIn, canCreate, preciseLocationsVisible, activePostCount, maxActivePosts, posts, page, totalPages, total]
      properties:
        signedIn: { type: boolean }
        # Capability flag — true only for paid (tier === 'pass') callers.
        canCreate: { type: boolean }
        # True when the caller receives EXACT meetup coordinates (lat/lng) for
        # posts they don't own — i.e. paid (tier === 'pass') callers. Free/no-
        # pass callers get null lat/lng for others' posts (coarse locationLabel
        # only) and a non-null one only for their own posts. Lets the client
        # show an "unlock exact locations" upsell without hardcoding tier logic.
        preciseLocationsVisible: { type: boolean }
        # The caller's current count of active (non-cancelled, future) posts.
        activePostCount: { type: integer }
        # Hard cap on active posts per user.
        maxActivePosts: { type: integer }
        posts:
          type: array
          items: { $ref: "#/components/schemas/FindPlayerPost" }
        page: { type: integer }
        totalPages: { type: integer }
        total: { type: integer }

    FindPlayerPostInput:
      type: object
      required: [latitude, longitude, tableNumber, scheduledAt]
      properties:
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        tableNumber: { type: integer, minimum: 0, maximum: 99999 }
        # Desired meetup time as an ISO instant. The poster's typed date is the
        # canonical label; must be the poster's local today or later (any time
        # of day) and at most one year out (server allows a 24h UTC grace).
        scheduledAt: { type: string, format: date-time }

    CreateFindPlayerPostResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        # Set on failure: "not_signed_in" | "not_paid" | "in_past" |
        # "too_far" | "duplicate_date" | "limit_reached".
        reason: { type: string }
        post: { $ref: "#/components/schemas/FindPlayerPost" }

    CancelFindPlayerPostInput:
      type: object
      required: [id]
      properties:
        id: { type: string }

    CancelFindPlayerPostResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        # Set on failure: "not_signed_in" | "not_found".
        reason: { type: string }
        post: { $ref: "#/components/schemas/FindPlayerPost" }

    Venue:
      type: object
      required: [id, name, latitude, longitude, active]
      properties:
        id: { type: string }
        name: { type: string }
        # Latitude/longitude in WGS84 — public business location.
        latitude: { type: number }
        longitude: { type: number }
        # Short locality label e.g. "Los Angeles, United States".
        locality: { type: ["string", "null"] }
        # Optional fuller street address.
        address: { type: ["string", "null"] }
        # Optional number of tables (shown when known).
        tableCount: { type: ["integer", "null"] }
        # Optional contact line (phone / handle / URL).
        contact: { type: ["string", "null"] }
        # How the hall charges players (stable token). Null when unknown.
        paymentType:
          type: ["string", "null"]
          enum: ["free", "per_game", "hourly"]
        # Whether the listing is shown on the public map.
        active: { type: boolean }
        # Informational "paid through" note (no enforcement). UTC instant.
        paidThroughAt: { type: ["string", "null"], format: date-time }

    VenueInput:
      type: object
      required: [name, latitude, longitude]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        locality: { type: ["string", "null"], maxLength: 200 }
        address: { type: ["string", "null"], maxLength: 500 }
        tableCount: { type: ["integer", "null"], minimum: 0, maximum: 9999 }
        contact: { type: ["string", "null"], maxLength: 200 }
        # How the hall charges players (stable token). Null/omitted = unknown.
        paymentType:
          type: ["string", "null"]
          enum: ["free", "per_game", "hourly"]
        # Defaults to true on create when omitted.
        active: { type: boolean }
        # Optional "paid through" date as an ISO instant.
        paidThroughAt: { type: ["string", "null"], format: date-time }

    VenueList:
      type: object
      required: [venues]
      properties:
        venues:
          type: array
          items: { $ref: "#/components/schemas/Venue" }

    VenuePage:
      type: object
      required: [venues, page, totalPages, total]
      properties:
        venues:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        # Current page number (1-based).
        page: { type: integer }
        # Total number of pages across all active venues.
        totalPages: { type: integer }
        # Total number of active venues (across all pages).
        total: { type: integer }

    Ad:
      type: object
      required: [id, headline, tagline]
      properties:
        id: { type: string }
        headline: { type: string }
        tagline: { type: string }
        # The buyer's screen name for a user-bought ad ("Sponsored by …").
        # Null for house/admin ads. NEVER an email.
        sponsor: { type: ["string", "null"] }

    AdInput:
      type: object
      required: [headline, tagline]
      properties:
        headline: { type: string, minLength: 1, maxLength: 60 }
        tagline: { type: string, minLength: 1, maxLength: 120 }

    AdList:
      type: object
      required: [ads]
      properties:
        ads:
          type: array
          items: { $ref: "#/components/schemas/Ad" }

    AdPage:
      type: object
      required: [ads, page, limit, total]
      properties:
        ads:
          type: array
          items: { $ref: "#/components/schemas/AdminAd" }
        # Current page number (1-based).
        page: { type: integer }
        # Page size used for this response.
        limit: { type: integer }
        # Total number of ads across all pages.
        total: { type: integer }

    AdMutationResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        # Failure reason token when success is false (e.g. "not_found").
        reason: { type: string }
        # The created/deleted ad when success is true.
        ad: { $ref: "#/components/schemas/Ad" }

    # Admin-facing ad row: the full moderation view (owner identity, status,
    # purchased window + price). House ads have isHouse=true and null owner.
    AdminAd:
      type: object
      required: [id, headline, tagline, status, isHouse, createdAt]
      properties:
        id: { type: string }
        headline: { type: string }
        tagline: { type: string }
        status: { type: string, enum: [pending_review, approved, denied] }
        # True for an admin/house ad (no buyer); false for a user-bought ad.
        isHouse: { type: boolean }
        # Buyer identity (paid ads only) — admin moderation view ONLY.
        ownerEmail: { type: ["string", "null"] }
        ownerScreenName: { type: ["string", "null"] }
        # Purchased run length + frozen price (paid ads only).
        days: { type: ["integer", "null"] }
        priceCents: { type: ["integer", "null"] }
        # Live window — set on approval (paid ads).
        startAt: { type: ["string", "null"], format: date-time }
        expiryAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    # A short summary of an ad created by a successful crypto purchase, returned
    # from /crypto/verify so the buyer sees it landed in review.
    AdSummary:
      type: object
      required: [id, headline, tagline, status]
      properties:
        id: { type: string }
        headline: { type: string }
        tagline: { type: string }
        status: { type: string, enum: [pending_review, approved, denied] }
        days: { type: ["integer", "null"] }

    # Current dynamic ad pricing for the buyer UI. The client computes the live
    # total as effectiveDailyCents × days; the server re-freezes the same
    # product at quote time so the two always agree.
    AdPricing:
      type: object
      required:
        [cryptoEnabled, baseDailyCents, minDailyCents, effectiveDailyCents, maxDays, activeAdsCount]
      properties:
        # True only when crypto checkout is open AND a wallet is configured.
        cryptoEnabled: { type: boolean }
        baseDailyCents: { type: integer }
        minDailyCents: { type: integer }
        # The current per-day rate after the demand multiplier + floor.
        effectiveDailyCents: { type: integer }
        # Max purchasable run length (days).
        maxDays: { type: integer }
        # How many ads are currently live (drives the multiplier — shown so the
        # price is explainable).
        activeAdsCount: { type: integer }

    AdQuoteInput:
      type: object
      required: [asset, headline, tagline, days]
      properties:
        asset: { type: string, enum: [usdc, eth] }
        headline: { type: string, minLength: 1, maxLength: 60 }
        tagline: { type: string, minLength: 1, maxLength: 120 }
        days: { type: integer, minimum: 1, maximum: 369 }

    # Like CryptoOrderQuote but for an ad purchase: no passKind, plus the
    # purchased run length. Always a manual (pay-to-address) order.
    AdCryptoOrder:
      type: object
      required:
        [id, manual, asset, network, chainId, receivingAddress, expectedAmount, decimals, displayAmount, priceCents, days, expiresAt]
      properties:
        id: { type: string }
        manual: { type: boolean }
        asset: { type: string, enum: [usdc, eth] }
        network: { type: string, enum: [base, base-sepolia] }
        chainId: { type: integer }
        receivingAddress: { type: string }
        tokenAddress: { type: ["string", "null"] }
        expectedAmount: { type: string }
        decimals: { type: integer }
        displayAmount: { type: string }
        # Frozen total price in USD cents (effectiveDailyCents × days).
        priceCents: { type: integer }
        days: { type: integer }
        expiresAt: { type: string, format: date-time }

    AdQuoteResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        order: { $ref: "#/components/schemas/AdCryptoOrder" }

    # One of the caller's own bought ads (their purchase history + live status).
    MyAd:
      type: object
      required: [id, headline, tagline, status, createdAt]
      properties:
        id: { type: string }
        headline: { type: string }
        tagline: { type: string }
        status: { type: string, enum: [pending_review, approved, denied] }
        days: { type: ["integer", "null"] }
        priceCents: { type: ["integer", "null"] }
        startAt: { type: ["string", "null"], format: date-time }
        expiryAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    MyAdsList:
      type: object
      required: [ads]
      properties:
        ads:
          type: array
          items: { $ref: "#/components/schemas/MyAd" }

    OsmVenue:
      type: object
      required: [id, name, latitude, longitude, source]
      properties:
        # Namespaced id e.g. "osm:node/123" so it never collides with verified
        # venue ids when the two sets are merged on the map.
        id: { type: string }
        name: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        # OSM rarely tags table counts; null unless a `tables` tag is present.
        tableCount: { type: ["integer", "null"] }
        source: { type: string, enum: [osm] }

    OsmVenueList:
      type: object
      required: [status, venues]
      properties:
        # ok: a fresh/cached result. too_broad: the bbox was wider than the
        # server will query (zoom in). error: upstream Overpass was unreachable.
        status: { type: string, enum: [ok, too_broad, error] }
        venues:
          type: array
          items: { $ref: "#/components/schemas/OsmVenue" }
        # True when `venues` were served from the stale-if-error cache because
        # every live upstream failed.
        stale: { type: boolean }

    VenueMutationResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        # Set on failure: "not_signed_in" | "not_admin" | "not_found".
        reason: { type: string }
        venue: { $ref: "#/components/schemas/Venue" }

    RepairVenueCoordinatesItem:
      type: object
      required: [id, name, status]
      properties:
        id: { type: string }
        name: { type: string }
        # updated: pin moved to the geocoded address.
        # unchanged: address geocoded to (effectively) the same spot.
        # failed: no address, or the address couldn't be geocoded (kept as-is).
        status: { type: string, enum: [updated, unchanged, failed] }
        # How far the pin moved, in metres (null when it couldn't be geocoded).
        distanceMeters: { type: ["number", "null"] }

    RepairVenueCoordinatesResult:
      type: object
      required: [success, total, updated, unchanged, failed, items]
      properties:
        success: { type: boolean }
        # Set on failure: "not_signed_in" | "not_admin".
        reason: { type: string }
        total: { type: integer }
        updated: { type: integer }
        unchanged: { type: integer }
        failed: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/RepairVenueCoordinatesItem" }

    BackfillGameSummariesResult:
      type: object
      required: [success, scanned, summarized, failed]
      properties:
        success: { type: boolean }
        # Set on failure: "not_signed_in" | "not_admin".
        reason: { type: string }
        scanned: { type: integer }
        summarized: { type: integer }
        failed: { type: integer }
