openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BreakBPM API — accounts, passes, and game persistence
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Identity, screen name
  - name: passes
    description: Pass purchases, discount codes, entitlements
  - name: games
    description: Game start gating and history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current account state (or null if signed-out)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  /auth/screen-name:
    patch:
      operationId: updateScreenName
      tags: [auth]
      summary: Update the signed-in user's screen name
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScreenNameUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

  /passes/redeem:
    post:
      operationId: redeemDiscountCode
      tags: [passes]
      summary: Redeem a discount code (issues a pass)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscountRedeemInput" }
      responses:
        "200":
          description: Redeemed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RedeemResult" }

  /passes/discount-codes:
    get:
      operationId: listMyGiftCodes
      tags: [passes]
      summary: List the caller's recently-generated Day-Pass gift codes
      description: >
        Returns the signed-in user's most recent gift codes (newest first)
        plus their cooldown state. Used by the Account screen to render the
        "Gift a Day Pass" section.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyGiftCodesResult" }
    post:
      operationId: generateGiftCode
      tags: [passes]
      summary: Generate a single-use 24-hour Day-Pass gift code
      description: >
        Year and Lifetime pass holders may generate one Day-Pass gift code
        every 12 hours. The new code is single-use, expires 24 hours after
        generation, and supersedes any previous unused gift code from the
        same issuer.
      responses:
        "200":
          description: Generated (or rejected with reason)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GiftCodeIssueResult" }

  /passes/checkout:
    post:
      operationId: createPassCheckout
      tags: [passes]
      summary: Begin a pass purchase — returns a checkout URL + opaque token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PassCheckoutInput" }
      responses:
        "200":
          description: Checkout created (or rejected if no provider)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutResult" }

  /passes/verify:
    post:
      operationId: verifyPassCheckout
      tags: [passes]
      summary: Verify a checkout token and grant the pass on success
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyCheckoutInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyResult" }

  # TODO(remove-before-launch): dev-only free Lifetime grant endpoint.
  # Gated server-side by DEV_FREE_UPGRADE_ENABLED flag; returns 404 when off.
  /passes/dev-grant-lifetime:
    post:
      operationId: devGrantLifetime
      tags: [passes]
      summary: (DEV ONLY) Grant the signed-in user a Lifetime pass for free
      responses:
        "200":
          description: Granted (or already had one)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DevGrantLifetimeResult" }

  /passes/plans:
    get:
      operationId: listPlans
      tags: [passes]
      summary: The user-facing plan catalog (prices + metadata)
      description: >
        Single source of truth for prices and plan metadata. The client reads
        this rather than hardcoding amounts. Includes one-time passes (Day,
        Lifetime) and recurring subscriptions (Monthly, Yearly).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanCatalog" }

  /subscriptions/checkout:
    post:
      operationId: createSubscriptionCheckout
      tags: [passes]
      summary: Begin a subscription purchase — returns a checkout URL + token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubscriptionCheckoutInput" }
      responses:
        "200":
          description: Checkout created (or rejected if no provider / Lifetime held)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutResult" }

  /subscriptions/verify:
    post:
      operationId: verifySubscriptionCheckout
      tags: [passes]
      summary: Verify a subscription checkout token and activate on success
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyCheckoutInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubscriptionVerifyResult" }

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [passes]
      summary: Cancel the caller's subscription (stops renewal at period end)
      responses:
        "200":
          description: Cancellation result (or rejected if no provider)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelSubscriptionResult" }

  # TODO(remove-before-launch): dev-only subscription activator, gated by
  # DEV_FREE_UPGRADE_ENABLED. Lets QA simulate an active subscription without
  # a real billing provider. Returns 404 when the flag is off.
  /subscriptions/dev-activate:
    post:
      operationId: devActivateSubscription
      tags: [passes]
      summary: (DEV ONLY) Activate a free subscription for the signed-in user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DevActivateSubscriptionInput" }
      responses:
        "200":
          description: Activated (or rejected)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubscriptionVerifyResult" }

  /games/start:
    post:
      operationId: startGame
      tags: [games]
      summary: Check whether the caller may start a new game
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartGameInput" }
      responses:
        "200":
          description: Allowed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StartGameResult" }

  /games/activity:
    post:
      operationId: recordGameActivity
      tags: [games]
      summary: Record a logged in-game action (resets the inactivity clock)
      description: >
        Called by the client every time a player logs an action
        (sink/miss/foul/safety). NOT a periodic heartbeat — the inactivity
        forfeit deliberately tracks gameplay, not tab liveness.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameActivityInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameActivityResult" }

  /games/resume:
    get:
      operationId: getResumableGame
      tags: [games]
      summary: Return the caller's most recent in-progress game, if any
      description: >
        Used on first mount when localStorage is empty (e.g. different
        device, cleared browser) so signed-in users can pick the game
        they had open back up. Sweeps stale games first so a long-idle
        row is auto-forfeited rather than offered for resume.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResumableGameResponse" }

  /games/abandon:
    post:
      operationId: abandonGame
      tags: [games]
      summary: Mark an in-progress game as abandoned (forfeit)
      description: >
        Called when the user explicitly declines to resume an offered
        in-progress game, so the row doesn't linger waiting for the
        inactivity sweep.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AbandonGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AbandonGameResult" }

  /games/resolve:
    post:
      operationId: resolveShareCode
      tags: [games]
      summary: Look up a share code → game metadata for the join flow
      description: >
        Rate-limited (per-IP) lookup. Returns game state hints so the
        client can decide whether to assign the caller as a player or as
        a spectator. Never returns the full gameState — the caller must
        explicitly POST /games/join to participate.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveShareCodeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolveShareCodeResult" }
        "429":
          description: Too many requests

  /games/join:
    post:
      operationId: joinGame
      tags: [games]
      summary: Join an active game by share code
      description: >
        Atomically allocates the next open slot, or returns spectator
        status when slots are full / the mode is solo. Anonymous callers
        get a guest displayName; their participation is not history-eligible.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinGameResult" }

  /games/state:
    get:
      operationId: getGameStateByCode
      tags: [games]
      summary: Poll an active game's latest snapshot (for joiners/spectators)
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string, minLength: 5, maxLength: 5 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameStateSnapshot" }

  /games/leave:
    post:
      operationId: leaveGame
      tags: [games]
      summary: Leave an in-progress game (forfeits on this participant's behalf)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeaveGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveGameResult" }

  /games/save:
    post:
      operationId: saveGame
      tags: [games]
      summary: Persist a completed game (signed-in users only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameSaveInput" }
      responses:
        "200":
          description: Saved (or skipped for anonymous users)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SaveGameResult" }

  /games/history:
    get:
      operationId: getGameHistory
      tags: [games]
      summary: List the caller's saved games (gated by tier)
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
          description: >
            Page number (1-indexed). Only respected for pass holders;
            free accounts always receive their fixed 3-game slice.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameHistoryResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Account:
      type: object
      required: [id, screenName, createdAt]
      properties:
        id: { type: string }
        screenName: { type: string }
        email: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    PassSummary:
      type: object
      required: [kind, startedAt, expiresAt, isLifetime]
      properties:
        kind: { type: string, enum: [day, year, lifetime] }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        isLifetime: { type: boolean }

    SubscriptionSummary:
      type: object
      required: [status, interval, currentPeriodEnd, cancelAtPeriodEnd]
      properties:
        status: { type: string, enum: [active, past_due, canceled] }
        interval: { type: string, enum: [month, year] }
        # Paid-through date. Renews on this date unless cancelAtPeriodEnd is
        # set, in which case access ends here.
        currentPeriodEnd: { type: string, format: date-time }
        cancelAtPeriodEnd: { type: boolean }

    Entitlement:
      type: object
      required: [tier, hasActivePass, historyVisibleLimit]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        hasActivePass: { type: boolean }
        # null means no cap (full history). Number means cap to N most recent.
        historyVisibleLimit: { type: ["integer", "null"] }
        activePass: { $ref: "#/components/schemas/PassSummary" }
        # Present when an active recurring subscription grants entitlement.
        activeSubscription: { $ref: "#/components/schemas/SubscriptionSummary" }

    Plan:
      type: object
      required: [id, name, priceCents, description, kind]
      properties:
        id: { type: string, enum: [day, monthly, yearly, lifetime] }
        name: { type: string }
        priceCents: { type: integer }
        description: { type: string }
        # "pass" = one-time purchase; "subscription" = recurring.
        kind: { type: string, enum: [pass, subscription] }
        # Present for one-time passes — the pass kind to issue.
        passKind: { type: string, enum: [day, lifetime] }
        # Present for subscriptions — the billing interval.
        interval: { type: string, enum: [month, year] }

    PlanCatalog:
      type: object
      required: [plans]
      properties:
        plans:
          type: array
          items: { $ref: "#/components/schemas/Plan" }

    SubscriptionCheckoutInput:
      type: object
      required: [interval]
      properties:
        interval: { type: string, enum: [month, year] }

    SubscriptionVerifyResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        subscription: { $ref: "#/components/schemas/SubscriptionSummary" }

    CancelSubscriptionResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        subscription: { $ref: "#/components/schemas/SubscriptionSummary" }

    DevActivateSubscriptionInput:
      type: object
      required: [interval]
      properties:
        interval: { type: string, enum: [month, year] }

    MeResponse:
      type: object
      required: [signedIn, entitlement, needsOnboarding]
      properties:
        signedIn: { type: boolean }
        # True when the user is signed-in but hasn't confirmed a screen name
        # yet — the client should mount the onboarding gate before app entry.
        needsOnboarding: { type: boolean }
        account: { $ref: "#/components/schemas/Account" }
        entitlement: { $ref: "#/components/schemas/Entitlement" }
        passes:
          type: array
          items: { $ref: "#/components/schemas/PassSummary" }
        # TODO(remove-before-launch): mirrors the server-side
        # DEV_FREE_UPGRADE_ENABLED flag so the Account screen can hide the
        # free-upgrade button when the matching route is disabled. Remove
        # together with the flag, the route, and the button.
        devFreeUpgradeEnabled: { type: boolean }

    ScreenNameUpdate:
      type: object
      required: [screenName]
      properties:
        screenName: { type: string, minLength: 1, maxLength: 32 }

    DiscountRedeemInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }

    RedeemResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }

    PassCheckoutInput:
      type: object
      required: [kind]
      properties:
        # Only one-time passes are purchasable. The former one-time "year" pass
        # is replaced by the Yearly subscription, so it is no longer accepted
        # here (legacy year-pass rows still resolve entitlement, but no new ones
        # can be bought).
        kind: { type: string, enum: [day, lifetime] }

    CheckoutResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # Provider-issued opaque token. Hand this to /passes/verify to
        # complete the purchase. Absent when success=false.
        opaqueToken: { type: string }
        # Optional URL to redirect the user to (e.g. Stripe Checkout).
        checkoutUrl: { type: string }

    VerifyCheckoutInput:
      type: object
      required: [opaqueToken]
      properties:
        opaqueToken: { type: string, minLength: 1, maxLength: 512 }

    VerifyResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }

    # TODO(remove-before-launch): paired with /passes/dev-grant-lifetime.
    DevGrantLifetimeResult:
      type: object
      required: [success, message, alreadyHad]
      properties:
        success: { type: boolean }
        message: { type: string }
        # True when the user already had a Lifetime pass (no new row issued).
        alreadyHad: { type: boolean }
        pass: { $ref: "#/components/schemas/PassSummary" }

    StartGameInput:
      type: object
      required: [gameType]
      properties:
        # Stored on the in-progress row so the inactivity sweep can exempt
        # practice mode (no opponent, no win condition → no forfeit).
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        # Total human-player slots for this game. Used by the join flow to
        # cap how many participants can be allocated. Defaults vary by
        # game type (1 for practice, 2 for versus).
        maxPlayers: { type: integer, minimum: 1, maximum: 4 }

    StartGameResult:
      type: object
      required: [allowed, tier]
      properties:
        allowed: { type: boolean }
        tier: { type: string, enum: [public, account, pass] }
        # Server-issued game id (signed-in users only). Use it for
        # /games/activity and to update the same row on /games/save.
        gameId: { type: ["string", "null"] }
        # Canonical 5-char share code (signed-in users only). For
        # anonymous games this is null and the client falls back to its
        # locally-generated code.
        shareCode: { type: ["string", "null"] }
        # Total human-player slots the server allocated for this game.
        maxPlayers: { type: ["integer", "null"] }
        # How long the server will tolerate inactivity before auto-forfeit
        # (signed-in users). Anonymous play has its own client-side cap.
        inactivityTimeoutMs: { type: integer }
        # Hard wall-clock cap for anonymous play. Null for signed-in users
        # (who use the inactivity timeout instead).
        maxGameDurationMs: { type: ["integer", "null"] }

    GameActivityInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }
        # Optional snapshot of the current client-side game state. When
        # provided, the server stashes it on the in-progress row so
        # /games/resume can hand it back on a different device / cleared
        # browser. Omit to leave the previous snapshot intact.
        gameState: {}

    ResumableGame:
      type: object
      required: [gameId, gameType, startedAt, lastActivityAt, gameState]
      properties:
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        startedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        # Most recent client-side snapshot (whatever the client last
        # posted via /games/activity). May be an empty object if no
        # snapshot has been recorded yet.
        gameState: {}

    ResumableGameResponse:
      type: object
      required: [resumable]
      properties:
        resumable: { type: boolean }
        game: { $ref: "#/components/schemas/ResumableGame" }

    AbandonGameInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }

    AbandonGameResult:
      type: object
      required: [abandoned]
      properties:
        abandoned: { type: boolean }
        message: { type: string }

    GameActivityResult:
      type: object
      required: [alive]
      properties:
        # False if the game was already auto-forfeited or no longer exists.
        # The client should stop logging activity and show the forfeit state.
        alive: { type: boolean }
        message: { type: string }

    GameSaveInput:
      type: object
      required: [shareCode, gameType, durationMs, sunkBallsCount, outcome, gameState, startedAt]
      properties:
        # If set, finalize this in-progress server-side game row.
        gameId: { type: ["string", "null"] }
        shareCode: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        winner: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        # Final shooting accuracy as a whole-number percentage (0–100) for
        # the winner (or the human in Shark mode), the same player `bpm` is
        # saved for. Null when no qualifying shots were taken.
        accuracy: { type: ["integer", "null"], minimum: 0, maximum: 100 }
        # Per-participant final accuracy, keyed by the player's slot index
        # (slot 0 is the host). Each entry's accuracy is computed from the
        # shots the host logged under that slot's player. Persisted on
        # game_participants so a joiner sees their OWN accuracy in history,
        # not the host/winner's. Optional for backward compatibility; when
        # omitted, only the row-level `accuracy` above is stored.
        participantAccuracies:
          type: array
          items:
            type: object
            required: [slotIndex, accuracy]
            properties:
              slotIndex: { type: integer, minimum: 0 }
              accuracy: { type: ["integer", "null"], minimum: 0, maximum: 100 }
        durationMs: { type: integer, minimum: 0 }
        sunkBallsCount: { type: integer, minimum: 0 }
        # `expired` is used when a practice session hits the 1-hour hard
        # wall-clock cap (no winner). Versus modes that hit the same cap
        # use `forfeit` (with a winner derived from whose turn it was).
        outcome: { type: string, enum: [won, lost, forfeit, completed, expired] }
        gameState: {}
        startedAt: { type: string, format: date-time }

    SaveGameResult:
      type: object
      required: [saved]
      properties:
        saved: { type: boolean }
        gameId: { type: string }
        message: { type: string }
        # True when the server refused to overwrite the row because it
        # was already finalized by the periodic sweep (hard 1-hour cap
        # or 60-min inactivity). The client should treat the game as
        # ended-by-server, drop its in-progress checkpoint, and NOT
        # retry the save. `endReason` identifies why.
        alreadyEnded: { type: boolean }
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]

    GameHistoryEntry:
      type: object
      required: [id, gameType, outcome, durationMs, sunkBallsCount, endedAt, sharkMode]
      properties:
        id: { type: string }
        gameType: { type: string }
        winner: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        # The viewing caller's OWN final shooting accuracy as a whole-number
        # percentage (0–100). Resolved from their game_participants row when
        # present (so a joiner sees their own accuracy), falling back to the
        # row-level winner/host accuracy for legacy rows. Null when not recorded.
        accuracy: { type: ["integer", "null"] }
        durationMs: { type: integer }
        sunkBallsCount: { type: integer }
        outcome: { type: string }
        shareCode: { type: string }
        endedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        sharkMode: { type: boolean }
        # Set when this row was auto-finalized by the server sweep.
        # Distinguishes the 1-hour hard wall-clock cap (`max_duration_60min`)
        # from the 60-min inactivity forfeit (`inactivity_60min`) so the
        # UI can label the reason instead of just showing "forfeit".
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]
        # Balls in the exact order they were pocketed during the game
        # (pocketing events only — sinks plus a terminal win/lose that
        # pocketed a ball). Drives the visual shot-log row in history.
        # `player` is the display name of whoever sank it; the invisible
        # Shark opponent appears as the literal name "Shark".
        pocketSequence:
          type: array
          items:
            type: object
            required: [ball, player]
            properties:
              ball: { type: integer }
              player: { type: string }

    GeneratedDiscountCode:
      type: object
      required: [code, grantsPassKind, issuedAt, expiresAt, redeemed, expired]
      properties:
        code: { type: string }
        grantsPassKind: { type: string, enum: [day, year, lifetime] }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        # True when the unique redemption has been consumed.
        redeemed: { type: boolean }
        # True when expiresAt is in the past (covers both natural 24h
        # expiry and supersession by a newer code).
        expired: { type: boolean }

    MyGiftCodesResult:
      type: object
      required: [eligible, codes, cooldownActive]
      properties:
        # False for users without an active Year or Lifetime pass — the
        # client uses this to hide the gift section entirely.
        eligible: { type: boolean }
        # Newest-first list of the caller's recent gift codes.
        codes:
          type: array
          items: { $ref: "#/components/schemas/GeneratedDiscountCode" }
        cooldownActive: { type: boolean }
        # When the next generation will be allowed. Null when no codes
        # have been generated yet.
        nextAvailableAt: { type: ["string", "null"], format: date-time }

    GiftCodeIssueResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # The newly-issued code (only present on success).
        code: { $ref: "#/components/schemas/GeneratedDiscountCode" }
        # Always set, including on success — the next allowed generation
        # timestamp so the client can show the cooldown immediately.
        nextAvailableAt: { type: string, format: date-time }

    ResolveShareCodeInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 5, maxLength: 5 }

    ResolveShareCodeResult:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        # Set when found=false. "not_found" | "ended" | "rate_limited"
        reason: { type: string }
        # Present when found=true.
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        maxPlayers: { type: integer }
        filledSlots: { type: integer }
        # True for practice / shark — joiners are spectator-only.
        soloMode: { type: boolean }
        hostName: { type: string }

    JoinGameInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 5, maxLength: 5 }
        # Optional display name for guest (anonymous) joiners. Signed-in
        # callers always use their screenName; this is ignored for them.
        guestName: { type: string, minLength: 1, maxLength: 24 }
        # Capability token from a prior /games/join on this device.
        # When present and matches a non-left participant in this game,
        # the server returns that existing slot instead of allocating a
        # new one. Makes guest rejoin (e.g. after a tab refresh)
        # idempotent so a single guest never holds two slots.
        guestToken: { type: string }

    JoinGameResult:
      type: object
      required: [joined, role, gameId]
      properties:
        joined: { type: boolean }
        # "player" → assigned to a slot; "spectator" → view-only;
        # "already_joined" → caller already holds a slot in this game.
        role: { type: string, enum: [player, spectator, already_joined] }
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        # Slot index (0-based). Null for spectators.
        slotIndex: { type: ["integer", "null"] }
        displayName: { type: string }
        # Echo of the canonical share code so the client can build the
        # /games/state poll URL.
        shareCode: { type: string }
        # Set when joined=false. "not_found" | "ended" | "rate_limited"
        # | "spectators_disabled" (host lacks an active pass/subscription,
        # so the view-only spectator role is unavailable). Also set on
        # successful spectator joins to explain why ("in_progress" | "full")
        # or on idempotent rejoins ("host" | "rejoin").
        reason: { type: string }
        # Capability token for guest (anonymous) joiners — they don't
        # have a userId, so they pass this token back on /games/leave
        # to forfeit their own slot. Null for signed-in callers.
        guestToken: { type: ["string", "null"] }

    LeaveGameInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }
        # Required for guest joiners; ignored for signed-in callers
        # (who authenticate via Clerk and are matched by userId).
        guestToken: { type: string }

    LeaveGameResult:
      type: object
      required: [left]
      properties:
        left: { type: boolean }
        # True when this departure also ended the game (forfeit).
        gameEnded: { type: boolean }

    GameStateSnapshot:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        ended: { type: boolean }
        startedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        gameState: {}
        participants:
          type: array
          items:
            type: object
            required: [slotIndex, displayName, isHost, hasLeft]
            properties:
              slotIndex: { type: integer }
              displayName: { type: string }
              isHost: { type: boolean }
              hasLeft: { type: boolean }
              isGuest: { type: boolean }

    GameHistoryResponse:
      type: object
      required: [tier, totalCount, visibleCount, games, truncated, page, totalPages]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        totalCount: { type: integer }
        visibleCount: { type: integer }
        truncated: { type: boolean }
        # Current page number (always 1 for free accounts).
        page: { type: integer }
        # Total number of pages (always 1 for free accounts).
        totalPages: { type: integer }
        games:
          type: array
          items: { $ref: "#/components/schemas/GameHistoryEntry" }
