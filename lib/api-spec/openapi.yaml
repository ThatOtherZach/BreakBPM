openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BreakBPM API — accounts, passes, and game persistence
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Identity, screen name
  - name: passes
    description: Pass purchases, discount codes, entitlements
  - name: games
    description: Game start gating and history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current account state (or null if signed-out)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  /auth/screen-name:
    patch:
      operationId: updateScreenName
      tags: [auth]
      summary: Update the signed-in user's screen name
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScreenNameUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

  /passes/redeem:
    post:
      operationId: redeemDiscountCode
      tags: [passes]
      summary: Redeem a discount code (issues a pass)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscountRedeemInput" }
      responses:
        "200":
          description: Redeemed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RedeemResult" }

  /passes/checkout:
    post:
      operationId: createPassCheckout
      tags: [passes]
      summary: Begin a pass purchase — returns a checkout URL + opaque token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PassCheckoutInput" }
      responses:
        "200":
          description: Checkout created (or rejected if no provider)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutResult" }

  /passes/verify:
    post:
      operationId: verifyPassCheckout
      tags: [passes]
      summary: Verify a checkout token and grant the pass on success
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyCheckoutInput" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyResult" }

  # TODO(remove-before-launch): dev-only free Lifetime grant endpoint.
  # Gated server-side by DEV_FREE_UPGRADE_ENABLED flag; returns 404 when off.
  /passes/dev-grant-lifetime:
    post:
      operationId: devGrantLifetime
      tags: [passes]
      summary: (DEV ONLY) Grant the signed-in user a Lifetime pass for free
      responses:
        "200":
          description: Granted (or already had one)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DevGrantLifetimeResult" }

  /games/start:
    post:
      operationId: startGame
      tags: [games]
      summary: Check whether the caller may start a new game
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartGameInput" }
      responses:
        "200":
          description: Allowed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StartGameResult" }

  /games/activity:
    post:
      operationId: recordGameActivity
      tags: [games]
      summary: Record a logged in-game action (resets the inactivity clock)
      description: >
        Called by the client every time a player logs an action
        (sink/miss/foul/safety). NOT a periodic heartbeat — the inactivity
        forfeit deliberately tracks gameplay, not tab liveness.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameActivityInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameActivityResult" }

  /games/resume:
    get:
      operationId: getResumableGame
      tags: [games]
      summary: Return the caller's most recent in-progress game, if any
      description: >
        Used on first mount when localStorage is empty (e.g. different
        device, cleared browser) so signed-in users can pick the game
        they had open back up. Sweeps stale games first so a long-idle
        row is auto-forfeited rather than offered for resume.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResumableGameResponse" }

  /games/abandon:
    post:
      operationId: abandonGame
      tags: [games]
      summary: Mark an in-progress game as abandoned (forfeit)
      description: >
        Called when the user explicitly declines to resume an offered
        in-progress game, so the row doesn't linger waiting for the
        inactivity sweep.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AbandonGameInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AbandonGameResult" }

  /games/save:
    post:
      operationId: saveGame
      tags: [games]
      summary: Persist a completed game (signed-in users only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GameSaveInput" }
      responses:
        "200":
          description: Saved (or skipped for anonymous users)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SaveGameResult" }

  /games/history:
    get:
      operationId: getGameHistory
      tags: [games]
      summary: List the caller's saved games (gated by tier)
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
          description: >
            Page number (1-indexed). Only respected for pass holders;
            free accounts always receive their fixed 3-game slice.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GameHistoryResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Account:
      type: object
      required: [id, screenName, createdAt]
      properties:
        id: { type: string }
        screenName: { type: string }
        email: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    PassSummary:
      type: object
      required: [kind, startedAt, expiresAt, isLifetime]
      properties:
        kind: { type: string, enum: [day, year, lifetime] }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        isLifetime: { type: boolean }

    Entitlement:
      type: object
      required: [tier, hasActivePass, historyVisibleLimit]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        hasActivePass: { type: boolean }
        # null means no cap (full history). Number means cap to N most recent.
        historyVisibleLimit: { type: ["integer", "null"] }
        activePass: { $ref: "#/components/schemas/PassSummary" }

    MeResponse:
      type: object
      required: [signedIn, entitlement, needsOnboarding]
      properties:
        signedIn: { type: boolean }
        # True when the user is signed-in but hasn't confirmed a screen name
        # yet — the client should mount the onboarding gate before app entry.
        needsOnboarding: { type: boolean }
        account: { $ref: "#/components/schemas/Account" }
        entitlement: { $ref: "#/components/schemas/Entitlement" }
        passes:
          type: array
          items: { $ref: "#/components/schemas/PassSummary" }
        # TODO(remove-before-launch): mirrors the server-side
        # DEV_FREE_UPGRADE_ENABLED flag so the Account screen can hide the
        # free-upgrade button when the matching route is disabled. Remove
        # together with the flag, the route, and the button.
        devFreeUpgradeEnabled: { type: boolean }

    ScreenNameUpdate:
      type: object
      required: [screenName]
      properties:
        screenName: { type: string, minLength: 1, maxLength: 32 }

    DiscountRedeemInput:
      type: object
      required: [code]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }

    RedeemResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }

    PassCheckoutInput:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [day, year, lifetime] }

    CheckoutResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        # Provider-issued opaque token. Hand this to /passes/verify to
        # complete the purchase. Absent when success=false.
        opaqueToken: { type: string }
        # Optional URL to redirect the user to (e.g. Stripe Checkout).
        checkoutUrl: { type: string }

    VerifyCheckoutInput:
      type: object
      required: [opaqueToken]
      properties:
        opaqueToken: { type: string, minLength: 1, maxLength: 512 }

    VerifyResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        pass: { $ref: "#/components/schemas/PassSummary" }

    # TODO(remove-before-launch): paired with /passes/dev-grant-lifetime.
    DevGrantLifetimeResult:
      type: object
      required: [success, message, alreadyHad]
      properties:
        success: { type: boolean }
        message: { type: string }
        # True when the user already had a Lifetime pass (no new row issued).
        alreadyHad: { type: boolean }
        pass: { $ref: "#/components/schemas/PassSummary" }

    StartGameInput:
      type: object
      required: [gameType]
      properties:
        # Stored on the in-progress row so the inactivity sweep can exempt
        # practice mode (no opponent, no win condition → no forfeit).
        gameType: { type: string, enum: [8ball, 9ball, practice] }

    StartGameResult:
      type: object
      required: [allowed, tier]
      properties:
        allowed: { type: boolean }
        tier: { type: string, enum: [public, account, pass] }
        # Server-issued game id (signed-in users only). Use it for
        # /games/activity and to update the same row on /games/save.
        gameId: { type: ["string", "null"] }
        # How long the server will tolerate inactivity before auto-forfeit
        # (signed-in users). Anonymous play has its own client-side cap.
        inactivityTimeoutMs: { type: integer }
        # Hard wall-clock cap for anonymous play. Null for signed-in users
        # (who use the inactivity timeout instead).
        maxGameDurationMs: { type: ["integer", "null"] }

    GameActivityInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }
        # Optional snapshot of the current client-side game state. When
        # provided, the server stashes it on the in-progress row so
        # /games/resume can hand it back on a different device / cleared
        # browser. Omit to leave the previous snapshot intact.
        gameState: {}

    ResumableGame:
      type: object
      required: [gameId, gameType, startedAt, lastActivityAt, gameState]
      properties:
        gameId: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        startedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        # Most recent client-side snapshot (whatever the client last
        # posted via /games/activity). May be an empty object if no
        # snapshot has been recorded yet.
        gameState: {}

    ResumableGameResponse:
      type: object
      required: [resumable]
      properties:
        resumable: { type: boolean }
        game: { $ref: "#/components/schemas/ResumableGame" }

    AbandonGameInput:
      type: object
      required: [gameId]
      properties:
        gameId: { type: string }

    AbandonGameResult:
      type: object
      required: [abandoned]
      properties:
        abandoned: { type: boolean }
        message: { type: string }

    GameActivityResult:
      type: object
      required: [alive]
      properties:
        # False if the game was already auto-forfeited or no longer exists.
        # The client should stop logging activity and show the forfeit state.
        alive: { type: boolean }
        message: { type: string }

    GameSaveInput:
      type: object
      required: [shareCode, gameType, durationMs, sunkBallsCount, outcome, gameState, startedAt]
      properties:
        # If set, finalize this in-progress server-side game row.
        gameId: { type: ["string", "null"] }
        shareCode: { type: string }
        gameType: { type: string, enum: [8ball, 9ball, practice] }
        winner: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        durationMs: { type: integer, minimum: 0 }
        sunkBallsCount: { type: integer, minimum: 0 }
        # `expired` is used when a practice session hits the 1-hour hard
        # wall-clock cap (no winner). Versus modes that hit the same cap
        # use `forfeit` (with a winner derived from whose turn it was).
        outcome: { type: string, enum: [won, lost, forfeit, completed, expired] }
        gameState: {}
        startedAt: { type: string, format: date-time }

    SaveGameResult:
      type: object
      required: [saved]
      properties:
        saved: { type: boolean }
        gameId: { type: string }
        message: { type: string }
        # True when the server refused to overwrite the row because it
        # was already finalized by the periodic sweep (hard 1-hour cap
        # or 60-min inactivity). The client should treat the game as
        # ended-by-server, drop its in-progress checkpoint, and NOT
        # retry the save. `endReason` identifies why.
        alreadyEnded: { type: boolean }
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]

    GameHistoryEntry:
      type: object
      required: [id, gameType, outcome, durationMs, sunkBallsCount, endedAt, sharkMode]
      properties:
        id: { type: string }
        gameType: { type: string }
        winner: { type: ["string", "null"] }
        bpm: { type: ["number", "null"] }
        durationMs: { type: integer }
        sunkBallsCount: { type: integer }
        outcome: { type: string }
        shareCode: { type: string }
        endedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        sharkMode: { type: boolean }
        # Set when this row was auto-finalized by the server sweep.
        # Distinguishes the 1-hour hard wall-clock cap (`max_duration_60min`)
        # from the 60-min inactivity forfeit (`inactivity_60min`) so the
        # UI can label the reason instead of just showing "forfeit".
        endReason:
          type: string
          enum: [max_duration_60min, inactivity_60min]

    GameHistoryResponse:
      type: object
      required: [tier, totalCount, visibleCount, games, truncated, page, totalPages]
      properties:
        tier: { type: string, enum: [public, account, pass] }
        totalCount: { type: integer }
        visibleCount: { type: integer }
        truncated: { type: boolean }
        # Current page number (always 1 for free accounts).
        page: { type: integer }
        # Total number of pages (always 1 for free accounts).
        totalPages: { type: integer }
        games:
          type: array
          items: { $ref: "#/components/schemas/GameHistoryEntry" }
